<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>文明摇篮 · 星球模拟器</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background:#020510; color:#c8d0e0;
    font-family:'PingFang SC','Microsoft YaHei',sans-serif;
    min-height:100vh; overflow:hidden;
    touch-action:manipulation; user-select:none; -webkit-user-select:none;
  }
  canvas { display:block; width:100vw; height:100vh; }

  .ui { position:fixed; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:10; }
  .ui > * { pointer-events:auto; }

  .top-bar { display:flex; justify-content:space-between; padding:10px 14px; }
  .badge { background:rgba(0,0,0,0.7); border:1px solid rgba(255,255,255,0.12); border-radius:20px; padding:6px 14px; font-size:0.72rem; color:#aab; }

  .side-panel {
    position:fixed; right:0; top:0; bottom:0; width:260px;
    background:rgba(10,14,24,0.95); border-left:1px solid rgba(255,255,255,0.08);
    backdrop-filter:blur(20px);
    transform:translateX(100%); transition:transform 0.35s ease;
    overflow-y:auto; padding:16px;
  }
  .side-panel.show { transform:translateX(0); }
  .side-panel::-webkit-scrollbar { width:3px; }
  .side-panel::-webkit-scrollbar-thumb { background:rgba(255,255,255,0.1); }

  .sp-title { font-size:0.9rem; font-weight:700; color:#e0e8f0; margin-bottom:14px; letter-spacing:1px; }
  .sp-section { margin-bottom:18px; }
  .sp-label { font-size:0.68rem; color:#5a6a80; margin-bottom:6px; display:flex; justify-content:space-between; }
  .sp-label .val { color:#aab; font-weight:600; }
  .slider-track { height:6px; background:rgba(255,255,255,0.06); border-radius:3px; position:relative; cursor:pointer; }
  .slider-fill { height:100%; border-radius:3px; position:absolute; left:0; top:0; }
  .slider-thumb { width:16px; height:16px; border-radius:50%; background:#fff; border:2px solid #60a5fa; position:absolute; top:-5px; transform:translateX(-50%); cursor:grab; box-shadow:0 0 10px rgba(96,165,250,0.4); }
  .slider-thumb:active { cursor:grabbing; }

  .action-btn {
    width:100%; padding:10px; margin-bottom:8px;
    background:rgba(96,165,250,0.08); border:1px solid rgba(96,165,250,0.2);
    border-radius:10px; color:#aab; font-size:0.78rem;
    cursor:pointer; font-family:inherit; text-align:left;
    display:flex; align-items:center; gap:8px;
    transition:all 0.2s;
  }
  .action-btn:hover { background:rgba(96,165,250,0.15); border-color:rgba(96,165,250,0.35); color:#e0e8f0; }
  .action-btn .a-icon { font-size:1.1rem; }

  .btn-toggle {
    position:fixed; right:12px; top:50%; transform:translateY(-50%);
    width:40px; height:40px; border-radius:50%;
    background:rgba(96,165,250,0.15); border:1px solid rgba(96,165,250,0.3);
    color:#60a5fa; font-size:1.2rem; cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    z-index:20; transition:all 0.3s;
  }
  .btn-toggle:hover { background:rgba(96,165,250,0.25); }
  .btn-toggle.active { right:270px; }

  .bottom-bar {
    position:fixed; bottom:0; left:0; right:0;
    display:flex; gap:6px; padding:8px 10px; justify-content:center;
  }
  .res-item { background:rgba(0,0,0,0.75); border:1px solid rgba(255,255,255,0.1); border-radius:12px; padding:8px 12px; display:flex; align-items:center; gap:6px; font-size:0.78rem; min-width:60px; justify-content:center; }
  .res-item .ri-icon { font-size:1rem; }
  .res-item .ri-val { font-weight:700; }
  .pop-c{color:#60a5fa} .tech-c{color:#f59e0b} .cul-c{color:#10b981} .chaos-c{color:#ef4444}

  .log-toast { position:fixed; top:70px; left:50%; transform:translateX(-50%); background:rgba(0,0,0,0.8); border:1px solid rgba(255,255,255,0.1); border-radius:12px; padding:8px 16px; font-size:0.75rem; color:#aab; opacity:0; transition:all 0.4s; pointer-events:none; z-index:15; }
  .log-toast.show { opacity:1; top:80px; }

  .event-popup { position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); background:rgba(10,14,24,0.97); border:1px solid rgba(120,140,200,0.25); border-radius:20px; padding:22px 18px; width:90%; max-width:360px; text-align:center; display:none; z-index:30; }
  .event-popup.show { display:block; animation:fadeIn 0.4s; }
  @keyframes fadeIn { from{opacity:0;transform:translate(-50%,-50%) scale(0.9)} to{opacity:1;transform:translate(-50%,-50%) scale(1)} }
  .event-popup .ep-icon { font-size:52px; margin-bottom:8px; }
  .event-popup .ep-title { font-size:1rem; font-weight:700; color:#e0e8f0; margin-bottom:6px; }
  .event-popup .ep-desc { font-size:0.78rem; color:#6a7a90; line-height:1.6; margin-bottom:14px; }
  .event-popup .ep-btn { display:block; width:100%; padding:12px; background:linear-gradient(135deg,#60a5fa,#a78bfa); color:#fff; border:none; border-radius:14px; font-size:0.88rem; font-weight:600; cursor:pointer; font-family:inherit; }

  .end-screen { position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); background:rgba(10,14,24,0.97); border:1px solid rgba(120,140,200,0.3); border-radius:24px; padding:26px 20px; width:90%; max-width:360px; text-align:center; display:none; z-index:30; }
  .end-screen.show { display:block; animation:fadeIn 0.6s; }
  .end-screen .es-icon { font-size:64px; margin-bottom:10px; }
  .end-screen .es-title { font-size:1.3rem; font-weight:800; margin-bottom:6px; }
  .end-screen .es-desc { font-size:0.82rem; color:#6a7a90; line-height:1.7; margin-bottom:14px; }
  .end-screen .es-grid { display:grid; grid-template-columns:1fr 1fr; gap:6px; margin:10px 0; }
  .end-screen .es-item { background:rgba(255,255,255,0.03); border-radius:10px; padding:10px; }
  .end-screen .es-item .esv { font-size:1.1rem; font-weight:700; }
  .end-screen .es-item .esl { font-size:0.62rem; color:#5a6a80; }
  .end-screen .es-btn { display:inline-block; margin-top:12px; padding:10px 28px; background:linear-gradient(135deg,#60a5fa,#a78bfa); color:#fff; border:none; border-radius:20px; font-size:0.85rem; font-weight:600; cursor:pointer; font-family:inherit; }

  @media (max-width:480px) {
    .side-panel { width:240px; }
    .btn-toggle.active { right:250px; }
  }
</style>
</head>
<body>

<canvas id="c"></canvas>

<div class="ui">
  <div class="top-bar">
    <div class="badge" id="eraBadge">🌌 原始星云</div>
    <div class="badge" id="turnBadge">纪元 1</div>
  </div>
  <div class="log-toast" id="logToast"></div>
</div>

<button class="btn-toggle" id="btnToggle">⚙️</button>

<div class="side-panel" id="sidePanel">
  <div class="sp-title">🌍 星球参数</div>

  <div class="sp-section">
    <div class="sp-label">🌡️ 平均温度 <span class="val" id="vTemp">15°C</span></div>
    <div class="slider-track" data-param="temp"><div class="slider-fill" id="fTemp" style="width:50%;background:linear-gradient(90deg,#3b82f6,#ef4444)"></div><div class="slider-thumb" id="tTemp" style="left:50%"></div></div>
  </div>

  <div class="sp-section">
    <div class="sp-label">💧 大气湿度 <span class="val" id="vHumid">50%</span></div>
    <div class="slider-track" data-param="humid"><div class="slider-fill" id="fHumid" style="width:50%;background:linear-gradient(90deg,#60a5fa,#3b82f6)"></div><div class="slider-thumb" id="tHumid" style="left:50%"></div></div>
  </div>

  <div class="sp-section">
    <div class="sp-label">🧭 磁场强度 <span class="val" id="vMag">50%</span></div>
    <div class="slider-track" data-param="mag"><div class="slider-fill" id="fMag" style="width:50%;background:linear-gradient(90deg,#a78bfa,#8b5cf6)"></div><div class="slider-thumb" id="tMag" style="left:50%"></div></div>
  </div>

  <div class="sp-section">
    <div class="sp-label">☄️ 陨石频率 <span class="val" id="vMeteor">20%</span></div>
    <div class="slider-track" data-param="meteor"><div class="slider-fill" id="fMeteor" style="width:20%;background:linear-gradient(90deg,#f59e0b,#ef4444)"></div><div class="slider-thumb" id="tMeteor" style="left:20%"></div></div>
  </div>

  <div class="sp-section">
    <div class="sp-label">🌊 地壳活动 <span class="val" id="vCrust">30%</span></div>
    <div class="slider-track" data-param="crust"><div class="slider-fill" id="fCrust" style="width:30%;background:linear-gradient(90deg,#f97316,#ef4444)"></div><div class="slider-thumb" id="tCrust" style="left:30%"></div></div>
  </div>

  <div class="sp-title" style="margin-top:20px">⚡ 重大行动</div>
  <button class="action-btn" id="actNext"><span class="a-icon">⏭️</span>推进一个纪元</button>
  <button class="action-btn" id="actIce"><span class="a-icon">🧊</span>触发冰河期</button>
  <button class="action-btn" id="actVolcano"><span class="a-icon">🌋</span>超级火山爆发</button>
  <button class="action-btn" id="actAsteroid"><span class="a-icon">☄️</span>引导陨石撞击</button>
  <button class="action-btn" id="actSun"><span class="a-icon">☀️</span>增强太阳辐射</button>
  <button class="action-btn" id="actComet"><span class="a-icon">💫</span>彗星带来水源</button>
</div>

<div class="bottom-bar">
  <div class="res-item"><span class="ri-icon">👥</span><span class="ri-val pop-c" id="rPop">1</span></div>
  <div class="res-item"><span class="ri-icon">⚙️</span><span class="ri-val tech-c" id="rTech">0</span></div>
  <div class="res-item"><span class="ri-icon">🎭</span><span class="ri-val cul-c" id="rCul">0</span></div>
  <div class="res-item"><span class="ri-icon">🌪️</span><span class="ri-val chaos-c" id="rChaos">0</span></div>
</div>

<div class="event-popup" id="eventPopup"></div>
<div class="end-screen" id="endScreen"></div>

<script>
// ========== Canvas 设置 ==========
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H, DPR;

function resize() {
  DPR = window.devicePixelRatio || 1;
  W = canvas.width = window.innerWidth * DPR;
  H = canvas.height = window.innerHeight * DPR;
  canvas.style.width = window.innerWidth + 'px';
  canvas.style.height = window.innerHeight + 'px';
  ctx.scale(DPR, DPR);
}
resize();
window.addEventListener('resize', resize);

// ========== 状态 ==========
var state = {
  turn: 1, maxTurn: 12,
  pop: 1, tech: 0, culture: 0, chaos: 0,
  era: 0,
  // 参数
  temp: 15, // -50 ~ 100
  humid: 50, // 0 ~ 100
  mag: 50, // 0 ~ 100
  meteor: 20, // 0 ~ 100
  crust: 30, // 0 ~ 100
  // 内部
  particles: [], stars: [],
  planetPulse: 0,
  eventsTriggered: [],
  gameOver: false
};

// ========== 参数配置 ==========
const params = {
  temp: { min:-50, max:100, unit:'°C', label:'温度' },
  humid: { min:0, max:100, unit:'%', label:'湿度' },
  mag: { min:0, max:100, unit:'%', label:'磁场' },
  meteor: { min:0, max:100, unit:'%', label:'陨石' },
  crust: { min:0, max:100, unit:'%', label:'地壳' }
};

// ========== 粒子 ==========
function spawnParticles(x,y,color,count) {
  for(let i=0;i<count;i++){
    state.particles.push({
      x,y,
      vx:(Math.random()-0.5)*4,
      vy:(Math.random()-0.5)*4-3,
      life:1, decay:0.015+Math.random()*0.03,
      color, size:2+Math.random()*4
    });
  }
}

// ========== 星空 ==========
function initStars() {
  state.stars = [];
  for(let i=0;i<150;i++){
    state.stars.push({
      x:Math.random()*window.innerWidth, y:Math.random()*window.innerHeight,
      r:Math.random()*1.5+0.3,
      twinkle:Math.random()*Math.PI*2,
      speed:0.02+Math.random()*0.04
    });
  }
}

// ========== 渲染 ==========
function draw() {
  const w = window.innerWidth, h = window.innerHeight;
  ctx.clearRect(0,0,w,h);

  const cx = w/2, cy = h*0.35;
  const pr = Math.min(w,h)*0.3;

  // 星空
  state.stars.forEach(s => {
    s.twinkle += s.speed;
    const alpha = 0.15 + Math.sin(s.twinkle)*0.25;
    ctx.fillStyle = `rgba(255,255,255,${alpha})`;
    ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI*2); ctx.fill();
  });

  // 光晕
  state.planetPulse += 0.015;
  const glowR = pr + Math.sin(state.planetPulse)*10;
  const glow = ctx.createRadialGradient(cx,cy,pr*0.4,cx,cy,glowR*1.5);
  const eraGlows = [
    'rgba(40,80,180,0.2)','rgba(40,140,80,0.2)',
    'rgba(180,140,40,0.2)','rgba(140,80,200,0.2)'
  ];
  glow.addColorStop(0,eraGlows[state.era]);
  glow.addColorStop(1,'transparent');
  ctx.fillStyle = glow;
  ctx.beginPath(); ctx.arc(cx,cy,glowR*1.5,0,Math.PI*2); ctx.fill();

  // 星球颜色基于参数
  const tempRatio = (state.temp + 50) / 150; // 0~1
  const humidRatio = state.humid / 100;
  const r = Math.round(20 + tempRatio*80 + (1-humidRatio)*40);
  const g = Math.round(30 + humidRatio*100 + (1-tempRatio)*30);
  const b = Math.round(60 + (1-tempRatio)*60 + humidRatio*40);
  const cr = Math.min(255, r), cg = Math.min(255, g), cb = Math.min(255, b);

  const planetGrad = ctx.createRadialGradient(cx-pr*0.25,cy-pr*0.25,pr*0.1,cx,cy,pr);
  planetGrad.addColorStop(0,`rgb(${cr+20},${cg+20},${cb+20})`);
  planetGrad.addColorStop(0.6,`rgb(${cr},${cg},${cb})`);
  planetGrad.addColorStop(1,`rgb(${Math.max(0,cr-40)},${Math.max(0,cg-40)},${Math.max(0,cb-40)})`);
  ctx.fillStyle = planetGrad;
  ctx.beginPath(); ctx.arc(cx,cy,pr,0,Math.PI*2); ctx.fill();

  // 大气层
  ctx.strokeStyle = 'rgba(255,255,255,0.06)';
  ctx.lineWidth = 2;
  ctx.beginPath(); ctx.arc(cx,cy,pr+3,0,Math.PI*2); ctx.stroke();

  // 磁场线（磁场强度高时显示）
  if(state.mag > 30){
    ctx.strokeStyle = `rgba(167,139,250,${state.mag/200})`;
    ctx.lineWidth = 1;
    for(let i=0;i<3;i++){
      const angle = state.planetPulse*0.5 + (i/3)*Math.PI;
      ctx.beginPath();
      ctx.ellipse(cx, cy, pr*(1.2+i*0.15), pr*(1.2+i*0.15)*0.3, angle, 0, Math.PI*2);
      ctx.stroke();
    }
  }

  // 陨石环（陨石频率高时显示）
  if(state.meteor > 30){
    ctx.fillStyle = `rgba(245,158,11,${state.meteor/300})`;
    for(let i=0;i<Math.floor(state.meteor/10);i++){
      const a = state.planetPulse*0.3 + (i/10)*Math.PI*2;
      const d = pr*(1.3 + Math.sin(a*3)*0.1);
      ctx.beginPath();
      ctx.arc(cx+Math.cos(a)*d, cy+Math.sin(a)*d*0.5, 1.5, 0, Math.PI*2);
      ctx.fill();
    }
  }

  // 地壳裂纹（地壳活动高时显示）
  if(state.crust > 40){
    ctx.strokeStyle = `rgba(239,68,68,${state.crust/200})`;
    ctx.lineWidth = 1.5;
    for(let i=0;i<Math.floor(state.crust/20);i++){
      const a = state.planetPulse*0.4 + (i/5)*Math.PI*2;
      ctx.beginPath();
      ctx.moveTo(cx+Math.cos(a)*pr*0.3, cy+Math.sin(a)*pr*0.3);
      ctx.lineTo(cx+Math.cos(a+0.5)*pr*0.8, cy+Math.sin(a+0.5)*pr*0.8);
      ctx.stroke();
    }
  }

  // 云层（湿度高时显示）
  if(state.humid > 40){
    ctx.fillStyle = `rgba(255,255,255,${state.humid/500})`;
    for(let i=0;i<Math.floor(state.humid/15);i++){
      const a = state.planetPulse*0.2 + (i/7)*Math.PI*2;
      const d = pr*(0.5 + Math.sin(a*2)*0.2);
      ctx.beginPath();
      ctx.arc(cx+Math.cos(a)*d, cy+Math.sin(a)*d*0.6, 8+Math.sin(a*3)*4, 0, Math.PI*2);
      ctx.fill();
    }
  }

  // 粒子
  state.particles = state.particles.filter(p => {
    p.life -= p.decay;
    if(p.life<=0) return false;
    p.x += p.vx; p.y += p.vy; p.vy += 0.05;
    ctx.fillStyle = p.color || 'rgba(255,255,255,'+p.life*0.6+')';
    ctx.beginPath(); ctx.arc(p.x,p.y,p.size*p.life,0,Math.PI*2); ctx.fill();
    return true;
  });
}

// ========== 模拟逻辑 ==========
function simulate() {
  // 基于参数计算文明变化
  let popChange = 0, techChange = 0, culChange = 0, chaosChange = 0;

  // 温度影响
  if(state.temp < -20) { popChange -= 2; chaosChange += 1; } // 太冷
  else if(state.temp < 0) { popChange -= 1; }
  else if(state.temp > 20 && state.temp < 35) { popChange += 2; } // 适宜
  else if(state.temp > 50) { popChange -= 3; chaosChange += 2; } // 太热

  // 湿度影响
  if(state.humid > 70) { popChange += 1; culChange += 1; } // 湿润利于农业
  if(state.humid > 90) { chaosChange += 1; } // 洪水
  if(state.humid < 20) { popChange -= 1; chaosChange += 1; } // 干旱

  // 磁场影响
  if(state.mag > 60) { techChange += 1; chaosChange -= 1; } // 强磁场保护
  if(state.mag < 30) { chaosChange += 2; } // 辐射伤害

  // 陨石影响
  if(state.meteor > 50) { popChange -= 3; chaosChange += 3; techChange += 1; } // 毁灭但带来稀有矿物
  else if(state.meteor > 20) { popChange -= 1; chaosChange += 1; }

  // 地壳影响
  if(state.crust > 60) { popChange -= 2; chaosChange += 2; techChange += 1; } // 火山带来矿产
  else if(state.crust > 30) { popChange += 1; techChange += 1; } // 适度地质活动

  // 随机波动
  popChange += Math.floor(Math.random()*3)-1;

  state.pop = Math.max(0, state.pop + popChange);
  state.tech = Math.max(0, state.tech + techChange);
  state.culture = Math.max(0, state.culture + culChange);
  state.chaos = Math.max(0, state.chaos + chaosChange);

  // 时代推进
  if(state.turn >= 4 && state.era < 1) state.era = 1;
  if(state.turn >= 7 && state.era < 2) state.era = 2;
  if(state.turn >= 10 && state.era < 3) state.era = 3;

  // 检查事件
  checkEvents();
  checkEnd();
}

// ========== 事件 ==========
const events = [
  { id:'life', turn:2, icon:'🦠', title:'生命萌芽', desc:'在适宜的温度和湿度下，原始汤中出现了第一批有机分子。', cond:()=>state.temp>-10&&state.temp<40&&state.humid>30 },
  { id:'cell', turn:3, icon:'🧬', title:'单细胞时代', desc:'简单的细胞结构在热泉附近形成，生命开始了漫长的演化。', cond:()=>state.crust>20 },
  { id:'multi', turn:4, icon:'🐟', title:'多细胞大爆发', desc:'海洋中突然涌现出复杂的多细胞生物，生命形态空前丰富。', cond:()=>state.humid>50&&state.temp>10 },
  { id:'land', turn:5, icon:'🦎', title:'登陆', desc:'第一批植物和动物爬上了陆地，全新的生态系统正在形成。', cond:()=>state.temp>5&&state.temp<35&&state.humid>30 },
  { id:'dino', turn:6, icon:'🦕', title:'巨兽时代', desc:'温暖湿润的气候孕育了巨型生物，它们统治了这颗星球。', cond:()=>state.temp>25&&state.humid>60 },
  { id:'extinct', turn:7, icon:'☄️', title:'大灭绝', desc:'环境剧变导致大规模灭绝，但幸存者获得了新的生存空间。', cond:()=>state.meteor>40||state.crust>60||state.temp<-10 },
  { id:'mammal', turn:8, icon:'🐒', title:'哺乳动物崛起', desc:'小型哺乳动物在灾难后迅速繁衍，智慧开始萌芽。', cond:()=>state.pop>0 },
  { id:'fire', turn:9, icon:'🔥', title:'火的驯服', desc:'智慧生物学会了使用火，文明的第一缕曙光出现了。', cond:()=>state.temp>0&&state.temp<40 },
  { id:'city', turn:10, icon:'🏙️', title:'城市建立', desc:'第一批城市在河流和平原上拔地而起，文字和法律随之诞生。', cond:()=>state.pop>=3&&state.humid>30 },
  { id:'science', turn:11, icon:'🔬', title:'科学革命', desc:'望远镜对准了星空，文明开始理解宇宙的法则。', cond:()=>state.tech>=3 },
  { id:'crisis', turn:12, icon:'🌍', title:'全球危机', desc:'文明面临自己制造的生存危机，命运掌握在你的手中。', cond:()=>true },
];

function checkEvents() {
  for(const evt of events){
    if(evt.turn === state.turn && !state.eventsTriggered.includes(evt.id) && evt.cond()){
      state.eventsTriggered.push(evt.id);
      showEvent(evt);
      return; // 一次只触发一个
    }
  }
}

function showEvent(evt) {
  const popup = document.getElementById('eventPopup');
  popup.innerHTML = `
    <div class="ep-icon">${evt.icon}</div>
    <div class="ep-title">${evt.title}</div>
    <div class="ep-desc">${evt.desc}</div>
    <button class="ep-btn" id="epBtn">继续 →</button>
  `;
  popup.classList.add('show');
  document.getElementById('epBtn').onclick = () => {
    popup.classList.remove('show');
  };
}

function checkEnd() {
  if(state.pop <= 0) { endGame('extinct'); return; }
  if(state.chaos >= 30) { endGame('chaos'); return; }
  if(state.turn > state.maxTurn) {
    if(state.tech >= 15 && state.culture >= 10) endGame('utopia');
    else if(state.tech >= 15 && state.chaos >= 10) endGame('dystopia');
    else if(state.pop >= 10) endGame('thriving');
    else endGame('modest');
  }
}

function endGame(type) {
  state.gameOver = true;
  const endings = {
    extinct: { icon:'💀', title:'文明终结', color:'#ef4444', desc:'这颗星球上的生命之火熄灭了。也许，在宇宙的另一个角落，新的氨基酸正在温暖的浅海中悄然合成。' },
    chaos: { icon:'🌪️', title:'混沌吞噬', color:'#f59e0b', desc:'文明在内部的撕裂和外部的灾难中崩溃。但废墟之下，总有种子在等待下一个春天。' },
    utopia: { icon:'🌈', title:'理想国', color:'#10b981', desc:'科技与文化达到完美平衡。没有战争，没有饥饿，每个生命都能自由地追求自己的星辰大海。' },
    dystopia: { icon:'👁️', title:'反乌托邦', color:'#a78bfa', desc:'科技飞速发展，但灵魂被遗忘。高效、冷酷、完美——但这还是文明吗？' },
    thriving: { icon:'🌟', title:'繁荣文明', color:'#60a5fa', desc:'你的人口蓬勃发展，文明在星球上遍地开花。这是一个充满活力的世界。' },
    modest: { icon:'🌱', title:'平凡之路', color:'#8a8a8a', desc:'没有惊天动地的奇迹，也没有毁灭性的灾难。你的文明安静地存在着，这本身就很美。' }
  };
  const e = endings[type];
  const es = document.getElementById('endScreen');
  es.innerHTML = `
    <div class="es-icon">${e.icon}</div>
    <div class="es-title" style="color:${e.color}">${e.title}</div>
    <div class="es-desc">${e.desc}</div>
    <div class="es-grid">
      <div class="es-item"><div class="esv" style="color:#60a5fa">${state.pop}</div><div class="esl">最终人口</div></div>
      <div class="es-item"><div class="esv" style="color:#f59e0b">${state.tech}</div><div class="esl">科技等级</div></div>
      <div class="es-item"><div class="esv" style="color:#10b981">${state.culture}</div><div class="esl">文化等级</div></div>
      <div class="es-item"><div class="esv" style="color:#ef4444">${state.chaos}</div><div class="esl">混沌指数</div></div>
    </div>
    <div style="font-size:0.7rem;color:#5a6a80;margin-top:4px">温度:${state.temp}°C 湿度:${state.humid}% 磁场:${state.mag}% 陨石:${state.meteor}% 地壳:${state.crust}%</div>
    <button class="es-btn" onclick="location.reload()">⟳ 再次孕育文明</button>
  `;
  es.classList.add('show');
}

// ========== UI 更新 ==========
function updateUI() {
  document.getElementById('rPop').textContent = state.pop;
  document.getElementById('rTech').textContent = state.tech;
  document.getElementById('rCul').textContent = state.culture;
  document.getElementById('rChaos').textContent = state.chaos;
  document.getElementById('turnBadge').textContent = '纪元 ' + state.turn;

  const eras = ['🌌 原始星云','🌿 远古时代','🏛️ 文明曙光','🚀 技术纪元'];
  document.getElementById('eraBadge').textContent = eras[state.era] || eras[3];

  // 更新参数显示
  document.getElementById('vTemp').textContent = state.temp + '°C';
  document.getElementById('vHumid').textContent = state.humid + '%';
  document.getElementById('vMag').textContent = state.mag + '%';
  document.getElementById('vMeteor').textContent = state.meteor + '%';
  document.getElementById('vCrust').textContent = state.crust + '%';

  updateSlider('temp', state.temp, params.temp);
  updateSlider('humid', state.humid, params.humid);
  updateSlider('mag', state.mag, params.mag);
  updateSlider('meteor', state.meteor, params.meteor);
  updateSlider('crust', state.crust, params.crust);
}

function updateSlider(key, val, cfg) {
  const pct = (val - cfg.min) / (cfg.max - cfg.min) * 100;
  document.getElementById('f'+key.charAt(0).toUpperCase()+key.slice(1)).style.width = pct + '%';
  document.getElementById('t'+key.charAt(0).toUpperCase()+key.slice(1)).style.left = pct + '%';
}

function showToast(msg) {
  const t = document.getElementById('logToast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

// ========== 滑块交互 ==========
let dragging = null;

function getSliderValue(track, cfg, clientX) {
  const rect = track.getBoundingClientRect();
  const pct = Math.max(0, Math.min(1, (clientX - rect.left) / rect.width));
  return Math.round(cfg.min + pct * (cfg.max - cfg.min));
}

function initSliders() {
  document.querySelectorAll('.slider-track').forEach(track => {
    const key = track.dataset.param;
    const cfg = params[key];

    track.addEventListener('mousedown', e => {
      dragging = key;
      state[key] = getSliderValue(track, cfg, e.clientX);
      updateUI();
      spawnParticles(e.clientX, e.clientY, '#60a5fa', 5);
    });
    track.addEventListener('touchstart', e => {
      dragging = key;
      state[key] = getSliderValue(track, cfg, e.touches[0].clientX);
      updateUI();
    }, {passive:true});
  });

  document.addEventListener('mousemove', e => {
    if(!dragging) return;
    const track = document.querySelector('[data-param="'+dragging+'"]');
    if(!track) return;
    state[dragging] = getSliderValue(track, params[dragging], e.clientX);
    updateUI();
  });
  document.addEventListener('touchmove', e => {
    if(!dragging) return;
    const track = document.querySelector('[data-param="'+dragging+'"]');
    if(!track) return;
    state[dragging] = getSliderValue(track, params[dragging], e.touches[0].clientX);
    updateUI();
  }, {passive:true});

  document.addEventListener('mouseup', () => { dragging = null; });
  document.addEventListener('touchend', () => { dragging = null; });
}

// ========== 行动按钮 ==========
document.getElementById('btnToggle').onclick = () => {
  const panel = document.getElementById('sidePanel');
  const btn = document.getElementById('btnToggle');
  panel.classList.toggle('show');
  btn.classList.toggle('active');
  btn.textContent = panel.classList.contains('show') ? '✕' : '⚙️';
};

document.getElementById('actNext').onclick = () => {
  if(state.gameOver) return;
  state.turn++;
  simulate();
  updateUI();
  showToast('⏭️ 纪元 ' + state.turn + ' 开始了');
  spawnParticles(window.innerWidth/2, window.innerHeight*0.35, '#60a5fa', 15);
};

document.getElementById('actIce').onclick = () => {
  state.temp -= 20; state.humid -= 10; state.chaos += 2;
  updateUI(); showToast('🧊 冰河期降临！温度骤降');
  spawnParticles(window.innerWidth/2, window.innerHeight*0.35, '#a5f3fc', 20);
};

document.getElementById('actVolcano').onclick = () => {
  state.crust += 30; state.temp += 10; state.chaos += 3; state.tech += 2;
  updateUI(); showToast('🌋 超级火山爆发！');
  spawnParticles(window.innerWidth/2, window.innerHeight*0.35, '#f97316', 25);
};

document.getElementById('actAsteroid').onclick = () => {
  state.meteor += 40; state.chaos += 4; state.pop -= 2; state.tech += 3;
  updateUI(); showToast('☄️ 陨石撞击！');
  spawnParticles(window.innerWidth/2, window.innerHeight*0.35, '#f59e0b', 30);
};

document.getElementById('actSun').onclick = () => {
  state.temp += 15; state.mag += 10;
  updateUI(); showToast('☀️ 太阳辐射增强！');
  spawnParticles(window.innerWidth/2, window.innerHeight*0.35, '#ffd452', 20);
};

document.getElementById('actComet').onclick = () => {
  state.humid += 30; state.meteor += 10; state.culture += 2;
  updateUI(); showToast('💫 彗星带来水源！');
  spawnParticles(window.innerWidth/2, window.innerHeight*0.35, '#60a5fa', 20);
};

// ========== 游戏循环 ==========
function gameLoop() {
  draw();
  requestAnimationFrame(gameLoop);
}

// ========== 启动 ==========
function start() {
  resize();
  initStars();
  initSliders();
  updateUI();
  gameLoop();
}
start();

// 暴露状态
window._gameState = state;
</script>
</body>
</html>
