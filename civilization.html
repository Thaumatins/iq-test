<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>文明摇篮 · 星球模拟器</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background:#020510; overflow:hidden;
    font-family:'PingFang SC','Microsoft YaHei',sans-serif;
    touch-action:manipulation; user-select:none; -webkit-user-select:none;
    width:100vw; height:100vh; height:100dvh;
  }
  canvas { display:block; }

  /* UI 层 */
  .ui {
    position:fixed; top:0; left:0; width:100%; height:100%;
    pointer-events:none; z-index:10;
  }
  .ui > * { pointer-events:auto; }

  /* 顶部栏 */
  .top-bar {
    display:flex; justify-content:space-between; align-items:center;
    padding:10px 14px;
  }
  .era-badge {
    background:rgba(0,0,0,0.7); border:1px solid rgba(255,255,255,0.15);
    border-radius:20px; padding:6px 16px;
    font-size:0.75rem; color:#aab; letter-spacing:1px;
  }
  .turn-badge {
    background:rgba(0,0,0,0.7); border:1px solid rgba(255,255,255,0.15);
    border-radius:20px; padding:6px 14px;
    font-size:0.75rem; color:#aab;
  }

  /* 底部资源栏 */
  .res-bar {
    position:fixed; bottom:0; left:0; right:0;
    display:flex; gap:6px; padding:8px 10px;
    justify-content:center;
  }
  .res-item {
    background:rgba(0,0,0,0.75); border:1px solid rgba(255,255,255,0.12);
    border-radius:14px; padding:8px 12px;
    display:flex; align-items:center; gap:6px;
    font-size:0.78rem; min-width:60px; justify-content:center;
  }
  .res-item .ri-icon { font-size:1rem; }
  .res-item .ri-val { font-weight:700; }
  .pop-c { color:#60a5fa; } .tech-c { color:#f59e0b; } .cul-c { color:#10b981; } .chaos-c { color:#ef4444; }

  /* 提示气泡 */
  .tooltip {
    position:fixed; pointer-events:none;
    background:rgba(0,0,0,0.85); border:1px solid rgba(255,255,255,0.2);
    border-radius:12px; padding:10px 14px;
    font-size:0.78rem; color:#ccd; max-width:200px;
    opacity:0; transition:opacity 0.2s;
    text-align:center; line-height:1.5;
  }
  .tooltip.show { opacity:1; }
  .tooltip .tt-title { font-weight:700; font-size:0.85rem; margin-bottom:3px; }

  /* 事件弹窗 */
  .event-popup {
    position:fixed; top:50%; left:50%; transform:translate(-50%,-50%);
    background:rgba(10,14,24,0.95); border:1px solid rgba(120,140,200,0.25);
    border-radius:20px; padding:24px 20px;
    width:90%; max-width:380px;
    text-align:center;
    display:none; z-index:20;
    backdrop-filter:blur(20px);
  }
  .event-popup.show { display:block; animation:fadeIn 0.4s; }
  @keyframes fadeIn { from{opacity:0;transform:translate(-50%,-50%) scale(0.9)} to{opacity:1;transform:translate(-50%,-50%) scale(1)} }
  .event-popup .ep-icon { font-size:56px; margin-bottom:8px; }
  .event-popup .ep-title { font-size:1.1rem; font-weight:700; color:#e0e8f8; margin-bottom:6px; }
  .event-popup .ep-desc { font-size:0.82rem; color:#6a7a90; line-height:1.6; margin-bottom:16px; }
  .event-popup .ep-effects { display:flex; gap:8px; justify-content:center; flex-wrap:wrap; margin-bottom:14px; }
  .event-popup .ep-eff { padding:4px 10px; border-radius:10px; font-size:0.7rem; font-weight:600; background:rgba(255,255,255,0.04); }
  .event-popup .ep-btn {
    display:block; width:100%; padding:12px;
    background:linear-gradient(135deg,#60a5fa,#a78bfa); color:#fff;
    border:none; border-radius:14px; font-size:0.9rem; font-weight:600;
    cursor:pointer; font-family:inherit;
  }

  /* 结束画面 */
  .end-screen {
    position:fixed; top:50%; left:50%; transform:translate(-50%,-50%);
    background:rgba(10,14,24,0.97); border:1px solid rgba(120,140,200,0.3);
    border-radius:24px; padding:28px 22px;
    width:90%; max-width:380px;
    text-align:center;
    display:none; z-index:30;
    backdrop-filter:blur(20px);
  }
  .end-screen.show { display:block; animation:fadeIn 0.6s; }
  .end-screen .es-icon { font-size:72px; margin-bottom:10px; }
  .end-screen .es-title { font-size:1.3rem; font-weight:800; margin-bottom:6px; }
  .end-screen .es-desc { font-size:0.82rem; color:#6a7a90; line-height:1.7; margin-bottom:14px; }
  .end-screen .es-grid { display:grid; grid-template-columns:1fr 1fr; gap:6px; margin:10px 0; }
  .end-screen .es-item { background:rgba(255,255,255,0.03); border-radius:10px; padding:10px; }
  .end-screen .es-item .esv { font-size:1.1rem; font-weight:700; }
  .end-screen .es-item .esl { font-size:0.62rem; color:#5a6a80; }
  .end-screen .es-btn {
    display:inline-block; margin-top:14px; padding:10px 30px;
    background:linear-gradient(135deg,#60a5fa,#a78bfa); color:#fff;
    border:none; border-radius:20px; font-size:0.85rem; font-weight:600;
    cursor:pointer; font-family:inherit;
  }

  /* 日志提示 */
  .log-toast {
    position:fixed; top:80px; left:50%; transform:translateX(-50%);
    background:rgba(0,0,0,0.8); border:1px solid rgba(255,255,255,0.1);
    border-radius:14px; padding:8px 18px;
    font-size:0.75rem; color:#aab;
    opacity:0; transition:all 0.4s;
    pointer-events:none; white-space:nowrap;
    z-index:15;
  }
  .log-toast.show { opacity:1; top:90px; }

  /* 行动提示 */
  .hint {
    position:fixed; bottom:100px; left:50%; transform:translateX(-50%);
    font-size:0.7rem; color:rgba(255,255,255,0.3);
    pointer-events:none;
    transition:opacity 1s;
  }
</style>
</head>
<body>

<canvas id="c"></canvas>

<div class="ui">
  <div class="top-bar">
    <div class="era-badge" id="eraBadge">🌌 原始星云</div>
    <div class="turn-badge" id="turnBadge">纪元 1</div>
  </div>

  <div class="log-toast" id="logToast"></div>

  <div class="res-bar">
    <div class="res-item"><span class="ri-icon">👥</span><span class="ri-val pop-c" id="rPop">1</span></div>
    <div class="res-item"><span class="ri-icon">⚙️</span><span class="ri-val tech-c" id="rTech">0</span></div>
    <div class="res-item"><span class="ri-icon">🎭</span><span class="ri-val cul-c" id="rCul">0</span></div>
    <div class="res-item"><span class="ri-icon">🌪️</span><span class="ri-val chaos-c" id="rChaos">0</span></div>
  </div>

  <div class="tooltip" id="tooltip"></div>
  <div class="event-popup" id="eventPopup"></div>
  <div class="end-screen" id="endScreen"></div>
  <div class="hint" id="hint">点击星球上的光点来发展文明</div>
</div>

<script>
// ========== Canvas 设置 ==========
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H, planetCX, planetCY, planetR;

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  planetCX = W/2;
  planetCY = H*0.38;
  planetR = Math.min(W,H)*0.28;
  // 如果瓦片已存在则重新计算坐标
  if(state.tiles && state.tiles.length > 0){
    state.tiles.forEach((t,i) => {
      const n = state.tiles.length;
      const angle = (i/n)*Math.PI*2 + (Math.random()-0.5)*0.4;
      const dist = planetR * (0.55 + Math.random()*0.35);
      t.x = planetCX + Math.cos(angle)*dist;
      t.y = planetCY + Math.sin(angle)*dist*0.8;
      t.r = planetR*0.18 + Math.random()*planetR*0.08;
      t.angle = angle; t.dist = dist;
    });
  }
}
window.addEventListener('resize', resize);

// ========== 游戏状态 ==========
var state = {
  turn: 1, maxTurn: 12,
  pop: 1, tech: 0, culture: 0, chaos: 0,
  era: 0, // 0=原始 1=远古 2=文明 3=现代
  tiles: [], // {x,y,r,type,active,level}
  particles: [],
  stars: [],
  planetPulse: 0,
  selectedTile: null,
  eventsTriggered: [],
  gameOver: false,
  ending: null
};

// ========== 星球瓦片 ==========
function generateTiles() {
  const types = [
    { name:'海洋', icon:'🌊', color:'#1a4a8a', effects:{pop:1,tech:0,culture:0,chaos:0} },
    { name:'火山', icon:'🌋', color:'#8b3a1a', effects:{pop:0,tech:1,culture:0,chaos:2} },
    { name:'森林', icon:'🌳', color:'#1a5a2a', effects:{pop:1,tech:0,culture:1,chaos:0} },
    { name:'矿脉', icon:'💎', color:'#5a4a3a', effects:{pop:0,tech:2,culture:0,chaos:1} },
    { name:'平原', icon:'🌾', color:'#5a8a2a', effects:{pop:2,tech:0,culture:0,chaos:0} },
    { name:'遗迹', icon:'🏛️', color:'#8a7a4a', effects:{pop:0,tech:1,culture:2,chaos:0} },
    { name:'冰原', icon:'❄️', color:'#8aaaba', effects:{pop:-1,tech:1,culture:0,chaos:1} },
    { name:'热泉', icon:'♨️', color:'#4a7a6a', effects:{pop:1,tech:1,culture:0,chaos:1} },
    { name:'高地', icon:'⛰️', color:'#6a5a4a', effects:{pop:0,tech:1,culture:1,chaos:1} },
    { name:'河口', icon:'🏞️', color:'#3a6a4a', effects:{pop:2,tech:0,culture:1,chaos:0} },
  ];

  state.tiles = [];
  const n = 6;
  for(let i=0;i<n;i++){
    const angle = (i/n)*Math.PI*2 + (Math.random()-0.5)*0.4;
    const dist = planetR * (0.55 + Math.random()*0.35);
    const x = planetCX + Math.cos(angle)*dist;
    const y = planetCY + Math.sin(angle)*dist*0.8;
    const type = types[Math.floor(Math.random()*types.length)];
    state.tiles.push({
      x,y, r:planetR*0.22 + Math.random()*planetR*0.1,
      type, active:true, level:1,
      angle, dist
    });
  }
}

// ========== 粒子 ==========
function spawnParticles(x,y,color,count) {
  for(let i=0;i<count;i++){
    state.particles.push({
      x,y,
      vx:(Math.random()-0.5)*3,
      vy:(Math.random()-0.5)*3-2,
      life:1, decay:0.02+Math.random()*0.04,
      color, size:2+Math.random()*3
    });
  }
}

// ========== 星空 ==========
function initStars() {
  for(let i=0;i<120;i++){
    state.stars.push({
      x:Math.random()*W, y:Math.random()*H,
      r:Math.random()*1.5+0.3,
      twinkle:Math.random()*Math.PI*2,
      speed:0.02+Math.random()*0.04
    });
  }
}

// ========== 渲染 ==========
function draw() {
  ctx.clearRect(0,0,W,H);
  const cx = planetCX, cy = planetCY, prd = planetR;

  // 星空
  state.stars.forEach(s => {
    s.twinkle += s.speed;
    const alpha = 0.15 + Math.sin(s.twinkle)*0.25;
    ctx.fillStyle = `rgba(255,255,255,${alpha})`;
    ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI*2); ctx.fill();
  });

  // 星球光晕
  state.planetPulse += 0.02;
  const glowR = Math.min(W,H)*0.3 + Math.sin(state.planetPulse)*8;
  const glow = ctx.createRadialGradient(cx,cy,glowR*0.5,cx,cy,glowR*1.4);
  const eraColors = [
    'rgba(40,80,180,0.15)','rgba(40,140,100,0.15)',
    'rgba(180,140,40,0.15)','rgba(140,80,200,0.15)'
  ];
  glow.addColorStop(0,eraColors[state.era]);
  glow.addColorStop(1,'transparent');
  ctx.fillStyle = glow;
  ctx.beginPath(); ctx.arc(cx,cy,glowR*1.4,0,Math.PI*2); ctx.fill();

  // 星球本体
  const planetGrad = ctx.createRadialGradient(cx-prd*0.2,cy-prd*0.2,prd*0.1,cx,cy,prd);
  const eraPlanetColors = [
    ['#0a2a5a','#1a4a8a','#0a1a3a'],
    ['#0a3a2a','#1a5a3a','#0a2a1a'],
    ['#3a2a0a','#5a4a1a','#2a1a0a'],
    ['#1a0a3a','#3a1a5a','#1a0a2a']
  ];
  const pc = eraPlanetColors[state.era];
  planetGrad.addColorStop(0,pc[0]);
  planetGrad.addColorStop(0.6,pc[1]);
  planetGrad.addColorStop(1,pc[2]);
  ctx.fillStyle = planetGrad;
  ctx.beginPath(); ctx.arc(cx,cy,prd,0,Math.PI*2); ctx.fill();

  // 星球表面纹理
  ctx.strokeStyle = 'rgba(255,255,255,0.04)';
  ctx.lineWidth = 1;
  for(let i=0;i<8;i++){
    const a = (i/8)*Math.PI*2;
    ctx.beginPath();
    ctx.arc(cx+Math.cos(a)*prd*0.3,cy+Math.sin(a)*prd*0.2,prd*0.3,0,Math.PI*2);
    ctx.stroke();
  }

  // 大气层
  ctx.strokeStyle = 'rgba(255,255,255,0.08)';
  ctx.lineWidth = 2;
  ctx.beginPath(); ctx.arc(cx,cy,prd+4,0,Math.PI*2); ctx.stroke();

  // 瓦片
  state.tiles.forEach(t => {
    if(!t.active) return;
    const pulse = 1 + Math.sin(state.planetPulse*2 + t.angle)*0.05;
    const r = t.r * pulse;
    const isSelected = state.selectedTile === t;

    // 光晕
    if(isSelected){
      const sg = ctx.createRadialGradient(t.x,t.y,r*0.5,t.x,t.y,r*1.5);
      sg.addColorStop(0,'rgba(255,255,255,0.2)');
      sg.addColorStop(1,'transparent');
      ctx.fillStyle = sg;
      ctx.beginPath(); ctx.arc(t.x,t.y,r*1.5,0,Math.PI*2); ctx.fill();
    }

    // 瓦片本体
    const tg = ctx.createRadialGradient(t.x-r*0.2,t.y-r*0.2,r*0.1,t.x,t.y,r);
    tg.addColorStop(0,t.type.color);
    tg.addColorStop(1,'rgba(0,0,0,0.4)');
    ctx.fillStyle = tg;
    ctx.beginPath(); ctx.arc(t.x,t.y,r,0,Math.PI*2); ctx.fill();

    // 边框
    ctx.strokeStyle = isSelected ? 'rgba(255,255,255,0.5)' : 'rgba(255,255,255,0.1)';
    ctx.lineWidth = isSelected ? 2 : 1;
    ctx.beginPath(); ctx.arc(t.x,t.y,r,0,Math.PI*2); ctx.stroke();

    // 图标
    ctx.font = `${r*0.7}px sans-serif`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(t.type.icon, t.x, t.y-r*0.1);

    // 名称
    ctx.font = `${r*0.25}px "PingFang SC","Microsoft YaHei",sans-serif`;
    ctx.fillStyle = 'rgba(255,255,255,0.7)';
    ctx.fillText(t.type.name, t.x, t.y+r*0.55);

    // 等级标记
    if(t.level>1){
      ctx.font = `${r*0.2}px sans-serif`;
      ctx.fillStyle = '#ffd452';
      for(let i=0;i<Math.min(t.level-1,3);i++){
        ctx.fillText('★', t.x-r*0.4+i*r*0.4, t.y-r*0.5);
      }
    }
  });

  // 粒子
  state.particles = state.particles.filter(p => {
    p.life -= p.decay;
    if(p.life<=0) return false;
    p.x += p.vx; p.y += p.vy;
    ctx.fillStyle = `rgba(255,255,255,${p.life*0.6})`;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.size*p.life,0,Math.PI*2); ctx.fill();
    return true;
  });

  // 城市小点（文明程度高时出现）
  if(state.pop >= 5){
    state.tiles.filter(t=>t.active&&t.level>=2).forEach(t=>{
      for(let i=0;i<Math.min(t.level,3);i++){
        const ax = t.x + (Math.random()-0.5)*t.r*1.5;
        const ay = t.y + (Math.random()-0.5)*t.r*1.5;
        ctx.fillStyle = `rgba(255,220,100,${0.4+Math.random()*0.4})`;
        ctx.fillRect(ax-1.5,ay-1.5,3,3);
      }
    });
  }
}

// ========== 事件系统 ==========
const allEvents = [
  { id:'life', turn:2, icon:'🦠', title:'生命萌芽', desc:'温暖的浅海中，第一批有机分子开始自我复制。生命的火花被点燃了。', effects:{pop:2,tech:1}, era:0 },
  { id:'multi', turn:3, icon:'🐟', title:'寒武纪大爆发', desc:'海洋中突然涌现了无数奇形怪状的生物，生命开启了疯狂的实验。', effects:{pop:3,tech:2,chaos:1}, era:0 },
  { id:'land', turn:5, icon:'🦎', title:'登陆', desc:'第一批植物和动物爬上了陆地，一个全新的世界在等待着它们。', effects:{pop:2,tech:2,culture:1}, era:1 },
  { id:'extinct', turn:6, icon:'☄️', title:'大灭绝', desc:'一颗小行星撞击了星球，尘埃遮蔽天空。但你选择的栖息地决定了幸存者的命运。', effects:{pop:-2,tech:1,chaos:-1}, era:1 },
  { id:'fire', turn:7, icon:'🔥', title:'火的驯服', desc:'智慧生物学会了使用火——这是文明真正的起点。', effects:{pop:2,tech:3,culture:2}, era:2 },
  { id:'city', turn:9, icon:'🏙️', title:'第一座城', desc:'在河口和平原上，第一批城市拔地而起。文字、法律、贸易随之诞生。', effects:{pop:3,tech:2,culture:3}, era:2 },
  { id:'science', turn:10, icon:'🔬', title:'科学革命', desc:'望远镜对准了星空，显微镜窥探了微观。人类开始理解宇宙的法则。', effects:{tech:4,culture:3,chaos:1}, era:3 },
  { id:'crisis', turn:11, icon:'🌍', title:'全球危机', desc:'文明第一次面临自己制造的生存危机——你会如何选择？', effects:{chaos:3,tech:2}, era:3 },
];

// ========== 交互 ==========
canvas.addEventListener('click', e => {
  if(state.gameOver) return;
  const rect = canvas.getBoundingClientRect();
  const scaleX = W / rect.width;
  const scaleY = H / rect.height;
  const mx = (e.clientX - rect.left) * scaleX;
  const my = (e.clientY - rect.top) * scaleY;

  // 检查是否点击了瓦片
  let clicked = null;
  if(state.tiles){
    for(const t of state.tiles){
      if(!t.active) continue;
      const dx = mx-t.x, dy = my-t.y;
      if(dx*dx+dy*dy < t.r*t.r*1.5){
        clicked = t; break;
      }
    }
  }

  if(clicked){
    state.selectedTile = clicked;
    applyTile(clicked);
  } else {
    // 没点到瓦片也检查是否在星球范围内，给出反馈
    const dxc = mx-planetCX, dyc = my-planetCY;
    if(dxc*dxc+dyc*dyc < planetR*planetR*1.2){
      // 点击了星球但没有瓦片，显示提示
      showToast('👆 点击星球表面的标记区域来发展文明');
    }
    state.selectedTile = null;
  }
});

canvas.addEventListener('mousemove', e => {
  const rect = canvas.getBoundingClientRect();
  const scaleX = W / rect.width;
  const scaleY = H / rect.height;
  const mx = (e.clientX - rect.left) * scaleX;
  const my = (e.clientY - rect.top) * scaleY;
  let hovered = null;
  if(state.tiles){
    for(const t of state.tiles){
      if(!t.active) continue;
      const dx = mx-t.x, dy = my-t.y;
      if(dx*dx+dy*dy < t.r*t.r*1.3){ hovered=t; break; }
    }
  }
  canvas.style.cursor = hovered ? 'pointer' : 'default';

  const tt = document.getElementById('tooltip');
  if(hovered){
    tt.innerHTML = `<div class="tt-title">${hovered.type.icon} ${hovered.type.name} Lv.${hovered.level}</div>
      点击发展：${getEffectText(hovered.type.effects)}`;
    tt.className = 'tooltip show';
    tt.style.left = (mx+20)+'px';
    tt.style.top = (my-40)+'px';
  } else {
    tt.className = 'tooltip';
  }
});

function getEffectText(eff){
  const parts = [];
  if(eff.pop) parts.push(`人口${eff.pop>0?'+':''}${eff.pop}`);
  if(eff.tech) parts.push(`科技${eff.tech>0?'+':''}${eff.tech}`);
  if(eff.culture) parts.push(`文化${eff.culture>0?'+':''}${eff.culture}`);
  if(eff.chaos) parts.push(`混沌${eff.chaos>0?'+':''}${eff.chaos}`);
  return parts.join(' ');
}

function applyTile(tile) {
  if(!state.tiles) return;
  const eff = tile.type.effects;
  state.pop = Math.max(0, state.pop + eff.pop);
  state.tech = Math.max(0, state.tech + eff.tech);
  state.culture = Math.max(0, state.culture + eff.culture);
  state.chaos = Math.max(0, state.chaos + eff.chaos);

  // 升级瓦片
  tile.level++;
  if(tile.level > 4) tile.level = 4;

  // 粒子效果
  spawnParticles(tile.x, tile.y, tile.type.color, 12);

  // 提示
  showToast(`${tile.type.icon} 发展了 ${tile.type.name}！${getEffectText(eff)}`);

  // 推进回合
  state.turn++;
  updateUI();

  // 检查时代
  if(state.turn >= 5 && state.era < 1) { state.era = 1; refreshTiles(); }
  if(state.turn >= 7 && state.era < 2) { state.era = 2; refreshTiles(); }
  if(state.turn >= 10 && state.era < 3) { state.era = 3; refreshTiles(); }

  // 检查事件
  const evt = allEvents.find(e => e.turn === state.turn && !state.eventsTriggered.includes(e.id));
  if(evt){
    state.eventsTriggered.push(evt.id);
    showEvent(evt);
  }

  // 检查结束
  checkGameEnd();
}

function refreshTiles() {
  const advancedTypes = [
    [
      { name:'平原', icon:'🌾', color:'#5a8a2a', effects:{pop:2,tech:0,culture:0,chaos:0} },
      { name:'森林', icon:'🌳', color:'#1a5a2a', effects:{pop:1,tech:0,culture:1,chaos:0} },
      { name:'热泉', icon:'♨️', color:'#4a7a6a', effects:{pop:1,tech:1,culture:0,chaos:1} },
    ],
    [
      { name:'矿脉', icon:'💎', color:'#5a4a3a', effects:{pop:0,tech:2,culture:0,chaos:1} },
      { name:'河口', icon:'🏞️', color:'#3a6a4a', effects:{pop:2,tech:0,culture:1,chaos:0} },
      { name:'高地', icon:'⛰️', color:'#6a5a4a', effects:{pop:0,tech:1,culture:1,chaos:1} },
    ],
    [
      { name:'城市', icon:'🏙️', color:'#8a8a3a', effects:{pop:2,tech:2,culture:2,chaos:1} },
      { name:'实验室', icon:'🔬', color:'#4a6a8a', effects:{pop:0,tech:3,culture:1,chaos:2} },
      { name:'学院', icon:'📚', color:'#6a4a6a', effects:{pop:0,tech:1,culture:3,chaos:0} },
    ]
  ];

  // 替换部分旧瓦片
  const pool = advancedTypes[state.era-1] || [];
  state.tiles.forEach((t,i) => {
    if(Math.random() < 0.4 && pool.length > 0){
      const nt = pool[Math.floor(Math.random()*pool.length)];
      t.type = nt;
      t.level = 1;
    }
  });
}

function showEvent(evt) {
  const popup = document.getElementById('eventPopup');
  popup.innerHTML = `
    <div class="ep-icon">${evt.icon}</div>
    <div class="ep-title">${evt.title}</div>
    <div class="ep-desc">${evt.desc}</div>
    <div class="ep-effects">
      ${evt.effects.pop?`<span class="ep-eff" style="color:#60a5fa">👥 ${evt.effects.pop>0?'+':''}${evt.effects.pop}</span>`:''}
      ${evt.effects.tech?`<span class="ep-eff" style="color:#f59e0b">⚙️ +${evt.effects.tech}</span>`:''}
      ${evt.effects.culture?`<span class="ep-eff" style="color:#10b981">🎭 +${evt.effects.culture}</span>`:''}
      ${evt.effects.chaos?`<span class="ep-eff" style="color:#ef4444">🌪️ ${evt.effects.chaos>0?'+':''}${evt.effects.chaos}</span>`:''}
    </div>
    <button class="ep-btn" id="epBtn">继续 →</button>
  `;
  popup.classList.add('show');

  document.getElementById('epBtn').onclick = () => {
    popup.classList.remove('show');
    // 应用事件效果
    const eff = evt.effects;
    state.pop = Math.max(0,state.pop + (eff.pop||0));
    state.tech += (eff.tech||0);
    state.culture += (eff.culture||0);
    state.chaos += (eff.chaos||0);
    if(eff.chaos) spawnParticles(W/2, H*0.38, '#ef4444', 20);
    updateUI();
    checkGameEnd();
  };
}

function showToast(msg) {
  const t = document.getElementById('logToast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 1800);
}

function checkGameEnd() {
  if(state.pop <= 0) { endGame('extinct'); return; }
  if(state.chaos >= 25) { endGame('chaos'); return; }
  if(state.turn > state.maxTurn) {
    if(state.tech >= 25 && state.culture >= 20) endGame('utopia');
    else if(state.tech >= 25 && state.chaos >= 15) endGame('dystopia');
    else if(state.pop >= 15) endGame('thriving');
    else endGame('modest');
  }
}

function endGame(type) {
  state.gameOver = true;
  const endings = {
    extinct: { icon:'💀', title:'文明终结', color:'#ef4444', desc:'这颗星球上的生命之火熄灭了。也许在宇宙的另一个角落，新的有机分子正在温暖的浅海中悄然合成。' },
    chaos: { icon:'🌪️', title:'混沌吞噬', color:'#f59e0b', desc:'文明在内部的撕裂和外部的灾难中崩溃。但废墟之下，总有种子在等待下一个春天。' },
    utopia: { icon:'🌈', title:'理想国', color:'#10b981', desc:'科技与文化达到完美平衡。没有战争，没有饥饿，每个生命都能自由地追求自己的星辰大海。' },
    dystopia: { icon:'👁️', title:'反乌托邦', color:'#a78bfa', desc:'科技飞速发展，但灵魂被遗忘。高效、冷酷、完美——但这还是文明吗？' },
    thriving: { icon:'🌟', title:'繁荣文明', color:'#60a5fa', desc:'你的人口蓬勃发展，文明在星球上遍地开花。这是一个充满活力的世界。' },
    modest: { icon:'🌱', title:'平凡之路', color:'#8a8a8a', desc:'没有惊天动地的奇迹，也没有毁灭性的灾难。你的文明安静地存在着，这本身就很美。' }
  };
  const e = endings[type];
  const es = document.getElementById('endScreen');
  es.innerHTML = `
    <div class="es-icon">${e.icon}</div>
    <div class="es-title" style="color:${e.color}">${e.title}</div>
    <div class="es-desc">${e.desc}</div>
    <div class="es-grid">
      <div class="es-item"><div class="esv" style="color:#60a5fa">${state.pop}</div><div class="esl">最终人口</div></div>
      <div class="es-item"><div class="esv" style="color:#f59e0b">${state.tech}</div><div class="esl">科技等级</div></div>
      <div class="es-item"><div class="esv" style="color:#10b981">${state.culture}</div><div class="esl">文化等级</div></div>
      <div class="es-item"><div class="esv" style="color:#ef4444">${state.chaos}</div><div class="esl">混沌指数</div></div>
    </div>
    <div style="font-size:0.72rem;color:#5a6a80;margin-top:4px;">历经 ${state.turn} 个纪元</div>
    <button class="es-btn" onclick="location.reload()">⟳ 再次孕育文明</button>
  `;
  es.classList.add('show');
}

function updateUI() {
  document.getElementById('rPop').textContent = state.pop;
  document.getElementById('rTech').textContent = state.tech;
  document.getElementById('rCul').textContent = state.culture;
  document.getElementById('rChaos').textContent = state.chaos;
  document.getElementById('turnBadge').textContent = `纪元 ${state.turn}`;

  const eraNames = ['🌌 原始星云','🌿 远古时代','🏛️ 文明曙光','🚀 技术纪元'];
  document.getElementById('eraBadge').textContent = eraNames[state.era] || eraNames[3];

  // 隐藏提示
  if(state.turn > 2){
    document.getElementById('hint').style.opacity = '0';
  }
}

// ========== 游戏循环 ==========
function gameLoop() {
  if(state.tiles) draw();
  requestAnimationFrame(gameLoop);
}

// ========== 启动 ==========
function start() {
  resize();
  initStars();
  generateTiles();
  updateUI();
  gameLoop();
}
start();

// 暴露状态到全局用于调试
window._gameState = state;
</script>
</body>
</html>
