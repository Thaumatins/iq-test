<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>杭州 · 去哪儿玩 | 旅行人格测试</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700;900&family=Noto+Sans+SC:wght@300;400;500;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0b1a1a;
    --card-bg: rgba(15,30,28,0.9);
    --gold: #b8a06e;
    --gold-light: #d4c098;
    --green: #5a8f7b;
    --green-light: #7ab8a0;
    --text: #d0d8d0;
    --text-dim: #6a7a72;
    --border: rgba(150,180,160,0.2);
  }

  body {
    font-family: 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
    background-image:
      radial-gradient(ellipse at 20% 20%, rgba(90,143,123,0.06) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 70%, rgba(184,160,110,0.05) 0%, transparent 50%),
      radial-gradient(ellipse at 50% 50%, rgba(122,184,160,0.03) 0%, transparent 60%);
  }

  /* 山水背景层 */
  .landscape {
    position: fixed; bottom: 0; left: 0; width: 100%; height: 35%;
    pointer-events: none; z-index: 0; opacity: 0.06;
    background:
      linear-gradient(180deg, transparent 0%, rgba(90,143,123,0.3) 60%, rgba(60,100,80,0.5) 100%);
  }
  .landscape::before {
    content: ''; position: absolute; bottom: 15%; left: 5%;
    width: 20%; height: 40%;
    background: radial-gradient(ellipse at center, rgba(120,160,140,0.4), transparent);
    border-radius: 50% 50% 0 0;
  }
  .landscape::after {
    content: ''; position: absolute; bottom: 10%; right: 10%;
    width: 15%; height: 30%;
    background: radial-gradient(ellipse at center, rgba(120,160,140,0.3), transparent);
    border-radius: 50% 50% 0 0;
  }

  /* 飘浮粒子 */
  .particles {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none; z-index: 0;
  }
  .particle {
    position: absolute; border-radius: 50%;
    animation: drift linear infinite;
    opacity: 0;
  }
  @keyframes drift {
    0% { transform: translateY(105vh) translateX(0) scale(0); opacity: 0; }
    5% { opacity: 0.6; }
    95% { opacity: 0.1; }
    100% { transform: translateY(-5vh) translateX(30px) scale(1.5); opacity: 0; }
  }

  /* 主容器 */
  .container {
    position: relative; z-index: 1;
    max-width: 660px; margin: 0 auto; padding: 20px;
  }

  /* 头部 */
  .header {
    text-align: center; padding: 44px 20px 30px;
  }
  .header .icon-row {
    font-size: 40px; margin-bottom: 8px;
    display: flex; justify-content: center; gap: 16px;
    animation: float 4s ease-in-out infinite;
  }
  @keyframes float {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-6px); }
  }
  .header h1 {
    font-family: 'Noto Serif SC', serif;
    font-size: 2rem; font-weight: 900;
    background: linear-gradient(135deg, #b8a06e, #d4c098, #a08850);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: 3px;
  }
  .header .subtitle {
    font-size: 0.85rem; color: var(--text-dim);
    margin-top: 6px; letter-spacing: 2px;
  }

  /* 卡片 */
  .card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 20px; padding: 34px 30px;
    margin-bottom: 20px;
    backdrop-filter: blur(16px);
    box-shadow: 0 8px 48px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.02);
  }

  /* 进度条 */
  .progress-wrap {
    display: flex; align-items: center; gap: 12px;
    margin-bottom: 26px;
  }
  .progress-bar {
    flex: 1; height: 3px;
    background: rgba(255,255,255,0.06);
    border-radius: 2px; overflow: hidden;
  }
  .progress-fill {
    height: 100%; border-radius: 2px;
    background: linear-gradient(90deg, var(--green), var(--gold-light));
    transition: width 0.5s ease;
  }
  .progress-num {
    font-size: 0.75rem; color: var(--text-dim);
    min-width: 36px; text-align: right; font-variant-numeric: tabular-nums;
  }

  /* 题目 */
  .question-wrap { display: none; }
  .question-wrap.active { display: block; animation: slideUp 0.4s ease; }
  @keyframes slideUp {
    from { opacity: 0; transform: translateY(18px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .q-label {
    font-size: 0.72rem; color: var(--gold);
    letter-spacing: 3px; margin-bottom: 8px;
  }
  .q-text {
    font-family: 'Noto Serif SC', serif;
    font-size: 1.2rem; font-weight: 600;
    color: #dce4dc; margin-bottom: 26px;
    line-height: 1.7;
  }

  /* 选项 */
  .options { display: flex; flex-direction: column; gap: 10px; }
  .opt-btn {
    display: flex; align-items: center; gap: 12px;
    width: 100%; padding: 14px 18px;
    background: rgba(255,255,255,0.025);
    border: 1px solid rgba(150,180,160,0.12);
    border-radius: 12px;
    color: #b0beb4; font-size: 0.9rem;
    cursor: pointer; transition: all 0.3s ease;
    text-align: left; font-family: inherit;
  }
  .opt-btn:hover {
    background: rgba(90,143,123,0.08);
    border-color: rgba(90,143,123,0.35);
    color: #d0dcd0; transform: translateX(3px);
  }
  .opt-btn.selected {
    background: rgba(90,143,123,0.12);
    border-color: var(--green);
    color: var(--green-light);
    box-shadow: 0 0 18px rgba(90,143,123,0.1);
  }
  .opt-icon { font-size: 1.3rem; width: 32px; text-align: center; flex-shrink: 0; }

  /* 按钮 */
  .btn-row { display: flex; gap: 12px; margin-top: 26px; justify-content: center; }
  .btn {
    padding: 11px 30px; border-radius: 26px;
    font-size: 0.9rem; font-weight: 600;
    cursor: pointer; border: none;
    transition: all 0.3s ease;
    font-family: inherit; letter-spacing: 1px;
  }
  .btn-prev {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-dim);
  }
  .btn-prev:hover { border-color: var(--gold); color: var(--gold-light); }
  .btn-next {
    background: linear-gradient(135deg, #3a6b55, #5a8f7b);
    color: #e8f0e8;
    box-shadow: 0 3px 16px rgba(90,143,123,0.2);
  }
  .btn-next:hover {
    box-shadow: 0 5px 24px rgba(90,143,123,0.35);
    transform: translateY(-1px);
  }
  .btn-next:disabled {
    opacity: 0.3; cursor: not-allowed;
    box-shadow: none; transform: none;
  }
  .btn-submit {
    background: linear-gradient(135deg, #6b553a, #b8a06e);
    color: #1a1610;
    font-size: 1rem; padding: 13px 40px;
    box-shadow: 0 3px 20px rgba(184,160,110,0.25);
  }
  .btn-submit:hover {
    box-shadow: 0 6px 30px rgba(184,160,110,0.4);
    transform: translateY(-2px);
  }
  .btn-submit:disabled {
    opacity: 0.3; cursor: not-allowed;
    box-shadow: none; transform: none;
  }

  /* ===== 结果页 ===== */
  .result-wrap { display: none; }
  .result-wrap.show { display: block; animation: slideUp 0.6s ease; }

  .result-hero {
    text-align: center; padding: 24px 0 10px;
  }
  .result-emoji {
    font-size: 72px; display: block;
    animation: popIn 0.7s ease;
  }
  @keyframes popIn {
    0% { transform: scale(0) rotate(-20deg); opacity: 0; }
    60% { transform: scale(1.12) rotate(3deg); }
    100% { transform: scale(1) rotate(0); opacity: 1; }
  }
  .result-title {
    font-family: 'Noto Serif SC', serif;
    font-size: 1.8rem; font-weight: 900; margin-top: 10px;
  }
  .result-subtitle {
    font-size: 0.9rem; color: var(--text-dim);
    margin-top: 4px; letter-spacing: 2px;
  }

  /* 目的地推荐卡片 */
  .dest-card {
    background: rgba(90,143,123,0.06);
    border: 1px solid rgba(90,143,123,0.15);
    border-radius: 14px; padding: 18px; margin-bottom: 12px;
    display: flex; gap: 14px; align-items: flex-start;
    transition: all 0.3s ease;
  }
  .dest-card:hover {
    background: rgba(90,143,123,0.1);
    border-color: rgba(90,143,123,0.3);
  }
  .dest-rank {
    font-family: 'Noto Serif SC', serif;
    font-size: 1.4rem; font-weight: 900;
    color: var(--gold); min-width: 36px;
    text-align: center; padding-top: 2px;
  }
  .dest-info { flex: 1; }
  .dest-name {
    font-size: 1.05rem; font-weight: 700;
    color: #dce4dc; margin-bottom: 4px;
  }
  .dest-meta {
    display: flex; gap: 16px; flex-wrap: wrap;
    font-size: 0.78rem; color: var(--text-dim);
    margin-bottom: 6px;
  }
  .dest-meta span { display: flex; align-items: center; gap: 4px; }
  .dest-desc {
    font-size: 0.85rem; color: #8a9a8e;
    line-height: 1.6;
  }
  .dest-tag {
    display: inline-block;
    padding: 2px 10px; border-radius: 10px;
    font-size: 0.7rem; margin-top: 6px;
    background: rgba(90,143,123,0.15);
    color: var(--green-light);
  }

  .section-title {
    font-family: 'Noto Serif SC', serif;
    font-size: 1.05rem; color: var(--gold);
    margin: 24px 0 14px; letter-spacing: 2px;
    padding-bottom: 8px;
    border-bottom: 1px solid rgba(150,180,160,0.1);
  }

  /* 人格标签 */
  .persona-badge {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 8px 18px; border-radius: 20px;
    background: rgba(90,143,123,0.1);
    border: 1px solid rgba(90,143,123,0.2);
    font-size: 0.85rem; color: var(--green-light);
    margin-bottom: 16px;
  }

  .btn-restart {
    background: transparent;
    border: 1px solid rgba(184,160,110,0.35);
    color: var(--gold); padding: 10px 26px;
    border-radius: 26px; font-size: 0.9rem;
    cursor: pointer; font-family: inherit;
    transition: all 0.3s ease;
  }
  .btn-restart:hover { background: rgba(184,160,110,0.1); }

  /* 加载 */
  .loading-overlay {
    display: none; position: fixed; top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(5,12,10,0.9);
    z-index: 100;
    justify-content: center; align-items: center;
    flex-direction: column;
  }
  .loading-overlay.show { display: flex; }
  .loading-spinner {
    width: 50px; height: 50px;
    border: 3px solid rgba(90,143,123,0.2);
    border-top-color: var(--green);
    border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text {
    margin-top: 18px; color: var(--text-dim);
    letter-spacing: 3px; font-size: 0.85rem;
  }

  @media (max-width: 480px) {
    .header h1 { font-size: 1.5rem; }
    .card { padding: 22px 16px; }
    .q-text { font-size: 1.05rem; }
    .opt-btn { padding: 12px 14px; font-size: 0.85rem; }
    .result-emoji { font-size: 56px; }
    .result-title { font-size: 1.4rem; }
    .dest-card { flex-direction: column; gap: 6px; }
    .dest-rank { text-align: left; }
  }
</style>
</head>
<body>

<div class="landscape"></div>

</div>

// ==========================================
// 状态管理
// ==========================================
let currentQ = 0;
let answers = {};
let selectedOpt = null;

// ==========================================
// 粒子背景
// ==========================================
function initParticles() {
  const c = document.getElementById('particles');
  const colors = ['#5a8f7b', '#7ab8a0', '#b8a06e', '#8a9a8e', '#6a7a72'];
  for (let i = 0; i < 30; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.style.left = Math.random() * 100 + '%';
    const s = Math.random() * 3 + 1;
    p.style.width = p.style.height = s + 'px';
    p.style.background = colors[Math.floor(Math.random() * colors.length)];
    p.style.animationDuration = (Math.random() * 14 + 10) + 's';
    p.style.animationDelay = (Math.random() * 12) + 's';
    c.appendChild(p);
  }
}

// ==========================================
// 渲染题目
// ==========================================
function renderQuestion() {
  const q = questions[currentQ];
  const container = document.getElementById('questionsContainer');
  const btnRow = document.getElementById('btnRow');
  const progressFill = document.getElementById('progressFill');
  const progressNum = document.getElementById('progressNum');

  selectedOpt = answers[q.id] !== undefined ? answers[q.id] : null;

  container.innerHTML = `
    <div class="question-wrap active">
      <div class="q-label">第 ${q.id} 问</div>
      <div class="q-text">${q.text}</div>
      <div class="options">
        ${q.options.map((opt, i) => `
          <button class="opt-btn ${selectedOpt === i ? 'selected' : ''}"
                  onclick="selectOption(${i})" data-idx="${i}">
            <span class="opt-icon">${opt.icon}</span>
            <span>${opt.text}</span>
          </button>
        `).join('')}
      </div>
    </div>
  `;

  progressFill.style.width = ((currentQ + 1) / questions.length * 100) + '%';
  progressNum.textContent = `${currentQ + 1}/${questions.length}`;

  const isLast = currentQ === questions.length - 1;
  btnRow.innerHTML = `
    ${currentQ > 0 ? '<button class="btn btn-prev" onclick="prevQuestion()">← 上一题</button>' : ''}
    ${isLast
      ? `<button class="btn btn-submit" onclick="submitTest()" ${selectedOpt === null ? 'disabled' : ''}>✦ 查看我的目的地 ✦</button>`
      : `<button class="btn btn-next" onclick="nextQuestion()" ${selectedOpt === null ? 'disabled' : ''}>下一题 →</button>`
    }
  `;
}

function selectOption(idx) {
  selectedOpt = idx;
  answers[questions[currentQ].id] = idx;
  document.querySelectorAll('.opt-btn').forEach(b => {
    b.classList.toggle('selected', parseInt(b.dataset.idx) === idx);
  });
  const btn = document.querySelector('.btn-next, .btn-submit');
  if (btn) btn.disabled = false;
}

function nextQuestion() {
  if (selectedOpt === null) return;
  if (currentQ < questions.length - 1) {
    currentQ++;
    renderQuestion();
    document.getElementById('questionCard').scrollIntoView({ behavior: 'smooth' });
  }
}

function prevQuestion() {
  if (currentQ > 0) {
    currentQ--;
    renderQuestion();
    document.getElementById('questionCard').scrollIntoView({ behavior: 'smooth' });
  }
}

// ==========================================
// 计算结果
// ==========================================
function calculateResult() {
  const scores = { zen: 0, nature: 0, culture: 0, social: 0, active: 0, explore: 0, lazy: 0, family: 0 };
  for (const [qId, optIdx] of Object.entries(answers)) {
    const q = questions.find(qq => qq.id === parseInt(qId));
    if (q && q.options[optIdx]) {
      scores[q.options[optIdx].value]++;
    }
  }
  const sorted = Object.entries(scores).sort((a, b) => b[1] - a[1]);
  return { type: sorted[0][0], scores };
}

// ==========================================
// 渲染结果
// ==========================================
function renderResult(result) {
  const persona = personaMap[result.type];
  document.getElementById('questionCard').style.display = 'none';

  const rc = document.getElementById('resultCard');
  rc.classList.add('show');

  document.getElementById('resultEmoji').textContent = persona.emoji;
  document.getElementById('resultTitle').textContent = persona.name;
  document.getElementById('resultSubtitle').textContent = persona.subtitle;
  document.getElementById('personaBadge').textContent = persona.badge;

  // 首选目的地
  const p = persona.primary;
  document.getElementById('primaryDest').innerHTML = `
    <div class="dest-card">
      <div class="dest-rank">🥇</div>
      <div class="dest-info">
        <div class="dest-name">${p.icon} ${p.name}</div>
        <div class="dest-meta">
          <span>📍 ${p.location}</span><span>📏 ${p.distance}</span><span>⏱️ ${p.time}</span>
        </div>
        <div class="dest-desc">${p.desc}</div>
        <span class="dest-tag">${p.tag}</span>
      </div>
    </div>
  `;

  // 更多推荐
  document.getElementById('moreDests').innerHTML = persona.more.map(d => `
    <div class="dest-card">
      <div class="dest-rank">${d.rank === '2' ? '🥈' : '🥉'}</div>
      <div class="dest-info">
        <div class="dest-name">${d.icon} ${d.name}</div>
        <div class="dest-meta">
          <span>📍 ${d.location}</span><span>📏 ${d.distance}</span><span>⏱️ ${d.time}</span>
        </div>
        <div class="dest-desc">${d.desc}</div>
        <span class="dest-tag">${d.tag}</span>
      </div>
    </div>
  `).join('');

  // 出行贴士
  document.getElementById('travelTips').innerHTML = persona.tips.map(t =>
    `<div style="padding:6px 0;font-size:0.85rem;color:#8a9a8e;">💡 ${t}</div>`
  ).join('');

  rc.scrollIntoView({ behavior: 'smooth' });
}

function submitTest() {
  if (selectedOpt === null) return;
  answers[questions[currentQ].id] = selectedOpt;

  if (Object.keys(answers).length < questions.length) {
    alert('请回答完所有题目再查看结果哦~');
    return;
  }

  document.getElementById('loadingOverlay').classList.add('show');
  setTimeout(() => {
    const result = calculateResult();
    document.getElementById('loadingOverlay').classList.remove('show');
    renderResult(result);
  }, 1500);
}

function restartTest() {
  currentQ = 0;
  answers = {};
  selectedOpt = null;
  document.getElementById('questionCard').style.display = '';
  document.getElementById('resultCard').classList.remove('show');
  renderQuestion();
  document.getElementById('questionCard').scrollIntoView({ behavior: 'smooth' });
}

// ==========================================
// 启动
// ==========================================
initParticles();
renderQuestion();
</script>
</body>
</html>
