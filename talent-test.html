<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>天赋罗盘 · 发现你的隐藏天赋</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700;900&family=Noto+Sans+SC:wght@300;400;500;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0f0f1a;
    --card: rgba(18,16,28,0.92);
    --primary: #7c6ff7;
    --primary-light: #a89bfc;
    --secondary: #f76f8e;
    --accent1: #4ecdc4;
    --accent2: #ffe66d;
    --accent3: #ff8c42;
    --text: #d8d8e8;
    --dim: #6a6a82;
    --border: rgba(140,130,200,0.18);
  }

  body {
    font-family: 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh; overflow-x: hidden;
    background-image:
      radial-gradient(ellipse at 30% 20%, rgba(124,111,247,0.07) 0%, transparent 50%),
      radial-gradient(ellipse at 70% 60%, rgba(247,111,142,0.05) 0%, transparent 50%),
      radial-gradient(ellipse at 50% 80%, rgba(78,205,196,0.04) 0%, transparent 50%);
  }

  /* 星空粒子 */
  .stars { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; }
  .star {
    position: absolute; border-radius: 50%;
    background: white;
    animation: twinkle ease-in-out infinite;
  }
  @keyframes twinkle {
    0%,100% { opacity: 0.2; transform: scale(1); }
    50% { opacity: 0.9; transform: scale(1.6); }
  }

  /* 星座线 */
  .constellation {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none; z-index: 0; opacity: 0.06;
  }
  .constellation svg { width: 100%; height: 100%; }

  .container {
    position: relative; z-index: 1;
    max-width: 640px; margin: 0 auto; padding: 20px;
  }

  /* 头部 */
  .header {
    text-align: center; padding: 40px 20px 28px;
  }
  .header .icon {
    font-size: 44px; margin-bottom: 8px;
    animation: floatIcon 4s ease-in-out infinite;
    display: inline-block;
  }
  @keyframes floatIcon {
    0%,100% { transform: translateY(0) rotate(0deg); }
    25% { transform: translateY(-8px) rotate(3deg); }
    75% { transform: translateY(4px) rotate(-3deg); }
  }
  .header h1 {
    font-family: 'Noto Serif SC', serif;
    font-size: 2.1rem; font-weight: 900;
    background: linear-gradient(135deg, #a89bfc, #f76f8e, #ffe66d);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: 3px;
  }
  .header .subtitle {
    font-size: 0.85rem; color: var(--dim);
    margin-top: 6px; letter-spacing: 2px;
  }

  /* 卡片 */
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px; padding: 32px 28px;
    margin-bottom: 20px;
    backdrop-filter: blur(16px);
    box-shadow: 0 8px 48px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.02);
  }

  /* 进度 */
  .progress-wrap {
    display: flex; align-items: center; gap: 12px;
    margin-bottom: 24px;
  }
  .progress-bar {
    flex: 1; height: 4px;
    background: rgba(255,255,255,0.06);
    border-radius: 2px; overflow: hidden;
  }
  .progress-fill {
    height: 100%; border-radius: 2px;
    background: linear-gradient(90deg, var(--primary), var(--secondary));
    transition: width 0.5s ease;
  }
  .progress-num {
    font-size: 0.75rem; color: var(--dim);
    min-width: 38px; text-align: right;
  }

  /* 题目 */
  .question-wrap { display: none; }
  .question-wrap.active { display: block; animation: slideUp 0.4s ease; }
  @keyframes slideUp {
    from { opacity: 0; transform: translateY(18px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .q-label {
    font-size: 0.72rem; color: var(--primary-light);
    letter-spacing: 3px; margin-bottom: 8px;
  }
  .q-text {
    font-family: 'Noto Serif SC', serif;
    font-size: 1.18rem; font-weight: 600;
    color: #e4e4f0; margin-bottom: 26px;
    line-height: 1.7;
  }

  .options { display: flex; flex-direction: column; gap: 10px; }
  .opt-btn {
    display: flex; align-items: center; gap: 12px;
    width: 100%; padding: 14px 18px;
    background: rgba(255,255,255,0.025);
    border: 1px solid rgba(140,130,200,0.12);
    border-radius: 12px;
    color: #b8b8cc; font-size: 0.9rem;
    cursor: pointer; transition: all 0.3s ease;
    text-align: left; font-family: inherit;
  }
  .opt-btn:hover {
    background: rgba(124,111,247,0.08);
    border-color: rgba(124,111,247,0.35);
    color: #d4d4e8; transform: translateX(3px);
  }
  .opt-btn.selected {
    background: rgba(124,111,247,0.12);
    border-color: var(--primary);
    color: var(--primary-light);
    box-shadow: 0 0 18px rgba(124,111,247,0.1);
  }
  .opt-icon { font-size: 1.3rem; width: 32px; text-align: center; flex-shrink: 0; }

  /* 按钮 */
  .btn-row { display: flex; gap: 12px; margin-top: 26px; justify-content: center; }
  .btn {
    padding: 11px 30px; border-radius: 26px;
    font-size: 0.9rem; font-weight: 600;
    cursor: pointer; border: none;
    transition: all 0.3s ease;
    font-family: inherit; letter-spacing: 1px;
  }
  .btn-prev {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--dim);
  }
  .btn-prev:hover { border-color: var(--primary); color: var(--primary-light); }
  .btn-next {
    background: linear-gradient(135deg, #5a4fcf, #7c6ff7);
    color: #e8e8ff;
    box-shadow: 0 3px 16px rgba(124,111,247,0.2);
  }
  .btn-next:hover {
    box-shadow: 0 5px 24px rgba(124,111,247,0.35);
    transform: translateY(-1px);
  }
  .btn-next:disabled {
    opacity: 0.3; cursor: not-allowed; box-shadow: none; transform: none;
  }
  .btn-submit {
    background: linear-gradient(135deg, #f76f8e, #c94b6c);
    color: #fff0f4;
    font-size: 1rem; padding: 13px 40px;
    box-shadow: 0 3px 20px rgba(247,111,142,0.25);
  }
  .btn-submit:hover {
    box-shadow: 0 6px 30px rgba(247,111,142,0.4);
    transform: translateY(-2px);
  }
  .btn-submit:disabled {
    opacity: 0.3; cursor: not-allowed; box-shadow: none; transform: none;
  }

  /* ===== 结果页 ===== */
  .result-wrap { display: none; }
  .result-wrap.show { display: block; animation: slideUp 0.6s ease; }

  .result-hero { text-align: center; padding: 20px 0 8px; }
  .result-emoji {
    font-size: 72px; display: block;
    animation: popIn 0.7s ease;
  }
  @keyframes popIn {
    0% { transform: scale(0) rotate(-20deg); opacity: 0; }
    60% { transform: scale(1.12) rotate(3deg); }
    100% { transform: scale(1) rotate(0); opacity: 1; }
  }
  .result-title {
    font-family: 'Noto Serif SC', serif;
    font-size: 1.8rem; font-weight: 900; margin-top: 8px;
  }
  .result-subtitle {
    font-size: 0.9rem; color: var(--dim);
    margin-top: 4px; letter-spacing: 2px;
  }

  /* 雷达图容器 */
  .radar-wrap {
    display: flex; justify-content: center;
    margin: 16px 0;
  }
  .radar-wrap canvas {
    max-width: 280px; max-height: 280px;
  }

  /* 天赋标签 */
  .talent-tags {
    display: flex; flex-wrap: wrap; gap: 8px;
    justify-content: center; margin: 12px 0 20px;
  }
  .talent-tag {
    padding: 6px 16px; border-radius: 18px;
    font-size: 0.8rem; font-weight: 600;
  }

  /* 描述区块 */
  .section-title {
    font-family: 'Noto Serif SC', serif;
    font-size: 1rem; color: var(--primary-light);
    margin: 22px 0 12px; letter-spacing: 2px;
    padding-bottom: 6px;
    border-bottom: 1px solid rgba(140,130,200,0.1);
  }

  .desc-block {
    background: rgba(124,111,247,0.05);
    border: 1px solid rgba(124,111,247,0.1);
    border-radius: 14px; padding: 18px;
    margin-bottom: 14px;
  }
  .desc-block h4 {
    font-size: 0.82rem; color: var(--accent2);
    letter-spacing: 2px; margin-bottom: 8px;
  }
  .desc-block p, .desc-block li {
    font-size: 0.88rem; color: #a8a8c0; line-height: 1.7;
  }
  .desc-block ul { list-style: none; padding: 0; }
  .desc-block li { padding: 4px 0 4px 18px; position: relative; }
  .desc-block li::before {
    content: '✦'; position: absolute; left: 0;
    color: var(--primary-light); font-size: 0.55rem; top: 8px;
  }

  /* 领域推荐 */
  .domain-grid {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 10px; margin: 14px 0;
  }
  .domain-item {
    background: rgba(255,255,255,0.025);
    border: 1px solid var(--border);
    border-radius: 10px; padding: 14px;
    text-align: center;
  }
  .domain-item .d-icon { font-size: 1.5rem; margin-bottom: 4px; }
  .domain-item .d-name {
    font-size: 0.82rem; font-weight: 600; color: #c8c8e0;
  }
  .domain-item .d-desc {
    font-size: 0.72rem; color: var(--dim); margin-top: 2px;
  }

  .btn-restart {
    background: transparent;
    border: 1px solid rgba(168,155,252,0.35);
    color: var(--primary-light); padding: 10px 26px;
    border-radius: 26px; font-size: 0.9rem;
    cursor: pointer; font-family: inherit;
    transition: all 0.3s ease;
    display: block; margin: 24px auto 0;
  }
  .btn-restart:hover { background: rgba(124,111,247,0.1); }

  /* 加载 */
  .loading-overlay {
    display: none; position: fixed; top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(8,8,16,0.92);
    z-index: 100;
    justify-content: center; align-items: center;
    flex-direction: column;
  }
  .loading-overlay.show { display: flex; }
  .loading-ring {
    width: 50px; height: 50px;
    border: 3px solid rgba(124,111,247,0.2);
    border-top-color: var(--primary);
    border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text {
    margin-top: 18px; color: var(--dim);
    letter-spacing: 3px; font-size: 0.85rem;
    animation: pulse 1.5s ease-in-out infinite;
  }
  @keyframes pulse {
    0%,100% { opacity: 0.6; }
    50% { opacity: 1; }
  }

  @media (max-width: 480px) {
    .header h1 { font-size: 1.5rem; }
    .card { padding: 22px 16px; }
    .q-text { font-size: 1.05rem; }
    .opt-btn { padding: 12px 14px; font-size: 0.84rem; }
    .result-emoji { font-size: 56px; }
    .result-title { font-size: 1.4rem; }
    .domain-grid { grid-template-columns: 1fr; }
  }
</style>
</head>

  </div>
</div>

// ==========================================
// 状态
// ==========================================
let currentQ = 0;
let answers = {};
let selectedOpt = null;

// ==========================================
// 星空背景
// ==========================================
function initStars() {
  const c = document.getElementById('stars');
  for (let i = 0; i < 60; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    s.style.left = Math.random() * 100 + '%';
    s.style.top = Math.random() * 100 + '%';
    const size = Math.random() * 2.5 + 0.5;
    s.style.width = s.style.height = size + 'px';
    s.style.animationDuration = (Math.random() * 3 + 2) + 's';
    s.style.animationDelay = (Math.random() * 4) + 's';
    c.appendChild(s);
  }
}

// ==========================================
// 渲染题目
// ==========================================
function renderQuestion() {
  const q = questions[currentQ];
  const container = document.getElementById('questionsContainer');
  const btnRow = document.getElementById('btnRow');
  const progressFill = document.getElementById('progressFill');
  const progressNum = document.getElementById('progressNum');

  selectedOpt = answers[q.id] !== undefined ? answers[q.id] : null;

  container.innerHTML = `
    <div class="question-wrap active">
      <div class="q-label">第 ${q.id} 问</div>
      <div class="q-text">${q.text}</div>
      <div class="options">
        ${q.options.map((opt, i) => `
          <button class="opt-btn ${selectedOpt === i ? 'selected' : ''}"
                  onclick="selectOption(${i})" data-idx="${i}">
            <span class="opt-icon">${opt.icon}</span>
            <span>${opt.text}</span>
          </button>
        `).join('')}
      </div>
    </div>
  `;

  progressFill.style.width = ((currentQ + 1) / questions.length * 100) + '%';
  progressNum.textContent = `${currentQ + 1}/${questions.length}`;

  const isLast = currentQ === questions.length - 1;
  btnRow.innerHTML = `
    ${currentQ > 0 ? '<button class="btn btn-prev" onclick="prevQuestion()">← 上一题</button>' : ''}
    ${isLast
      ? `<button class="btn btn-submit" onclick="submitTest()" ${selectedOpt === null ? 'disabled' : ''}>✦ 解锁我的天赋 ✦</button>`
      : `<button class="btn btn-next" onclick="nextQuestion()" ${selectedOpt === null ? 'disabled' : ''}>下一题 →</button>`
    }
  `;
}

function selectOption(idx) {
  selectedOpt = idx;
  answers[questions[currentQ].id] = idx;
  document.querySelectorAll('.opt-btn').forEach(b => {
    b.classList.toggle('selected', parseInt(b.dataset.idx) === idx);
  });
  const btn = document.querySelector('.btn-next, .btn-submit');
  if (btn) btn.disabled = false;
}

function nextQuestion() {
  if (selectedOpt === null) return;
  if (currentQ < questions.length - 1) {
    currentQ++;
    renderQuestion();
    document.getElementById('questionCard').scrollIntoView({ behavior: 'smooth' });
  }
}

function prevQuestion() {
  if (currentQ > 0) {
    currentQ--;
    renderQuestion();
    document.getElementById('questionCard').scrollIntoView({ behavior: 'smooth' });
  }
}

// ==========================================
// 计算结果
// ==========================================
function calculateResult() {
  const scores = {};
  for (const [qId, optIdx] of Object.entries(answers)) {
    const q = questions.find(qq => qq.id === parseInt(qId));
    if (q && q.options[optIdx]) {
      const v = q.options[optIdx].value;
      scores[v] = (scores[v] || 0) + 1;
    }
  }
  const sorted = Object.entries(scores).sort((a, b) => b[1] - a[1]);
  const primary = sorted[0][0];
  const secondary = sorted.length > 1 ? sorted[1][0] : primary;
  return { primary, secondary, scores, sorted };
}

// ==========================================
// 雷达图
// ==========================================
function drawRadar(scores) {
  const canvas = document.getElementById('radarCanvas');
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  const size = 280;
  canvas.width = size * dpr;
  canvas.height = size * dpr;
  canvas.style.width = size + 'px';
  canvas.style.height = size + 'px';
  ctx.scale(dpr, dpr);

  const allKeys = ['logic','creative','social','empathy','body','focus','visual','intuition','action'];
  const labels = { logic:'逻辑', creative:'创造', social:'社交', empathy:'共情', body:'身体', focus:'专注', visual:'视觉', intuition:'直觉', action:'行动' };
  const colors = { logic:'#7c6ff7', creative:'#f76f8e', social:'#4ecdc4', empathy:'#ffe66d', body:'#ff8c42', focus:'#a89bfc', visual:'#ff6b6b', intuition:'#c084fc', action:'#f97316' };

  const n = allKeys.length;
  const cx = size / 2, cy = size / 2;
  const r = size * 0.35;
  const maxScore = 10;

  ctx.clearRect(0, 0, size, size);

  // 网格
  for (let level = 1; level <= 5; level++) {
    ctx.beginPath();
    for (let i = 0; i < n; i++) {
      const angle = (Math.PI * 2 / n) * i - Math.PI / 2;
      const lr = r * (level / 5);
      const x = cx + lr * Math.cos(angle);
      const y = cy + lr * Math.sin(angle);
      if (i === 0) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    }
    ctx.closePath();
    ctx.strokeStyle = 'rgba(255,255,255,0.06)';
    ctx.stroke();
  }

  // 轴线
  for (let i = 0; i < n; i++) {
    const angle = (Math.PI * 2 / n) * i - Math.PI / 2;
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.lineTo(cx + r * Math.cos(angle), cy + r * Math.sin(angle));
    ctx.strokeStyle = 'rgba(255,255,255,0.08)';
    ctx.stroke();
  }

  // 数据
  ctx.beginPath();
  for (let i = 0; i < n; i++) {
    const key = allKeys[i];
    const val = scores[key] || 0;
    const angle = (Math.PI * 2 / n) * i - Math.PI / 2;
    const lr = r * Math.min(val / 5, 1);
    const x = cx + lr * Math.cos(angle);
    const y = cy + lr * Math.sin(angle);
    if (i === 0) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);
  }
  ctx.closePath();
  ctx.fillStyle = 'rgba(124,111,247,0.15)';
  ctx.fill();
  ctx.strokeStyle = 'rgba(168,155,252,0.5)';
  ctx.lineWidth = 2;
  ctx.stroke();

  // 数据点
  for (let i = 0; i < n; i++) {
    const key = allKeys[i];
    const val = scores[key] || 0;
    const angle = (Math.PI * 2 / n) * i - Math.PI / 2;
    const lr = r * Math.min(val / 5, 1);
    const x = cx + lr * Math.cos(angle);
    const y = cy + lr * Math.sin(angle);
    ctx.beginPath();
    ctx.arc(x, y, 4, 0, Math.PI * 2);
    ctx.fillStyle = colors[key] || '#7c6ff7';
    ctx.fill();
  }

  // 标签
  ctx.fillStyle = '#8a8a9e';
  ctx.font = '11px "Noto Sans SC", "PingFang SC", sans-serif';
  ctx.textAlign = 'center';
  for (let i = 0; i < n; i++) {
    const angle = (Math.PI * 2 / n) * i - Math.PI / 2;
    const lr = r + 22;
    const x = cx + lr * Math.cos(angle);
    const y = cy + lr * Math.sin(angle) + 4;
    ctx.fillText(labels[allKeys[i]], x, y);
  }
}

// ==========================================
// 渲染结果
// ==========================================
function renderResult(result) {
  const talent = talentTypes[result.primary];
  const secondaryTalent = talentTypes[result.secondary];

  document.getElementById('questionCard').style.display = 'none';
  const rc = document.getElementById('resultCard');
  rc.classList.add('show');

  document.getElementById('resultEmoji').textContent = talent.emoji;
  document.getElementById('resultTitle').innerHTML = `<span style="color:${talent.color}">${talent.name}</span>`;
  document.getElementById('resultSubtitle').textContent = talent.subtitle;

  // 标签
  const allTags = [...talent.tags];
  if (secondaryTalent && result.primary !== result.secondary) {
    allTags.push(`辅助天赋：${secondaryTalent.name}`);
  }
  document.getElementById('talentTags').innerHTML = allTags.map(t =>
    `<span class="talent-tag" style="background:${talent.color}20;color:${talent.color};border:1px solid ${talent.color}40">${t}</span>`
  ).join('');

  // 雷达图
  drawRadar(result.scores);

  // 天赋解析
  document.getElementById('talentAnalysis').innerHTML = talent.analysis.map(a => `
    <div class="desc-block">
      <h4>${a.title}</h4>
      <p>${a.text}</p>
    </div>
  `).join('');

  // 领域推荐
  document.getElementById('domainGrid').innerHTML = talent.domains.map(d => `
    <div class="domain-item">
      <div class="d-icon">${d.icon}</div>
      <div class="d-name">${d.name}</div>
      <div class="d-desc">${d.desc}</div>
    </div>
  `).join('');

  // 发展建议
  document.getElementById('adviceSection').innerHTML = `
    <div class="desc-block">
      <ul>
        ${talent.advice.map(a => `<li>${a}</li>`).join('')}
      </ul>
    </div>
  `;

  rc.scrollIntoView({ behavior: 'smooth' });
}

function submitTest() {
  if (selectedOpt === null) return;
  answers[questions[currentQ].id] = selectedOpt;

  if (Object.keys(answers).length < questions.length) {
    alert('请回答完所有题目再解锁天赋哦~');
    return;
  }

  document.getElementById('loadingOverlay').classList.add('show');
  setTimeout(() => {
    const result = calculateResult();
    document.getElementById('loadingOverlay').classList.remove('show');
    renderResult(result);
  }, 1500);
}

function restartTest() {
  currentQ = 0;
  answers = {};
  selectedOpt = null;
  document.getElementById('questionCard').style.display = '';
  document.getElementById('resultCard').classList.remove('show');
  renderQuestion();
  document.getElementById('questionCard').scrollIntoView({ behavior: 'smooth' });
}

// ==========================================
// 启动
// ==========================================
initStars();
renderQuestion();
</script>
