<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>五行灵兽 · 命格测试</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700;900&family=Noto+Sans+SC:wght@300;400;500;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: #0a0a0f;
    color: #e0d8c8;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* 背景粒子 */
  .bg-particles {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none; z-index: 0;
  }
  .particle {
    position: absolute;
    border-radius: 50%;
    animation: floatUp linear infinite;
    opacity: 0;
  }
  @keyframes floatUp {
    0% { transform: translateY(100vh) scale(0); opacity: 0; }
    10% { opacity: 0.8; }
    90% { opacity: 0.2; }
    100% { transform: translateY(-10vh) scale(1.5); opacity: 0; }
  }

  /* 八卦装饰 */
  .bagua-decoration {
    position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
    width: 600px; height: 600px; pointer-events: none; z-index: 0;
    opacity: 0.04;
  }
  .bagua-outer {
    width: 100%; height: 100%;
    border: 3px solid rgba(200,170,100,0.3);
    border-radius: 50%;
    animation: baguaSpin 60s linear infinite;
  }
  .bagua-inner {
    position: absolute; top: 15%; left: 15%; width: 70%; height: 70%;
    border: 2px solid rgba(200,170,100,0.2);
    border-radius: 50%;
    animation: baguaSpin 40s linear infinite reverse;
  }
  @keyframes baguaSpin { to { transform: rotate(360deg); } }

  /* 主容器 */
  .container {
    position: relative; z-index: 1;
    max-width: 680px; margin: 0 auto;
    padding: 20px;
  }

  /* 头部 */
  .header {
    text-align: center; padding: 40px 20px 30px;
  }
  .header .symbol {
    font-size: 56px; margin-bottom: 10px;
    animation: pulse 3s ease-in-out infinite;
  }
  @keyframes pulse {
    0%,100% { transform: scale(1); opacity: 1; }
    50% { transform: scale(1.08); opacity: 0.85; }
  }
  .header h1 {
    font-family: 'Noto Serif SC', serif;
    font-size: 2.2rem; font-weight: 900;
    background: linear-gradient(135deg, #d4a853, #f0d78c, #c9973a);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: 4px;
  }
  .header .subtitle {
    font-size: 0.9rem; color: #8a8070;
    margin-top: 8px; letter-spacing: 3px;
  }

  /* 卡片 */
  .card {
    background: linear-gradient(145deg, rgba(20,18,15,0.95), rgba(30,25,18,0.95));
    border: 1px solid rgba(180,140,80,0.25);
    border-radius: 20px;
    padding: 36px 32px;
    margin-bottom: 20px;
    backdrop-filter: blur(20px);
    box-shadow: 0 8px 40px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.03);
  }

  /* 进度条 */
  .progress-wrap {
    display: flex; align-items: center; gap: 12px;
    margin-bottom: 28px;
  }
  .progress-bar {
    flex: 1; height: 4px;
    background: rgba(255,255,255,0.08);
    border-radius: 2px; overflow: hidden;
  }
  .progress-fill {
    height: 100%; border-radius: 2px;
    background: linear-gradient(90deg, #c9973a, #f0d78c);
    transition: width 0.5s ease;
  }
  .progress-num {
    font-size: 0.8rem; color: #8a8070;
    min-width: 40px; text-align: right;
  }

  /* 题目 */
  .question-wrap { display: none; }
  .question-wrap.active { display: block; animation: fadeSlideIn 0.45s ease; }
  @keyframes fadeSlideIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .question-number {
    font-size: 0.75rem; color: #c9973a;
    letter-spacing: 3px; margin-bottom: 10px;
    text-transform: uppercase;
  }
  .question-text {
    font-family: 'Noto Serif SC', serif;
    font-size: 1.25rem; font-weight: 600;
    color: #e8dcc8;
    margin-bottom: 28px;
    line-height: 1.7;
  }

  /* 选项 */
  .options { display: flex; flex-direction: column; gap: 12px; }
  .option-btn {
    display: flex; align-items: center; gap: 14px;
    width: 100%; padding: 16px 20px;
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(180,140,80,0.15);
    border-radius: 14px;
    color: #c8b898;
    font-size: 0.95rem; cursor: pointer;
    transition: all 0.3s ease;
    text-align: left;
    font-family: inherit;
  }
  .option-btn:hover {
    background: rgba(200,150,60,0.08);
    border-color: rgba(200,150,60,0.35);
    color: #e8dcc8;
    transform: translateX(4px);
  }
  .option-btn.selected {
    background: rgba(200,150,60,0.12);
    border-color: #c9973a;
    color: #f0d78c;
    box-shadow: 0 0 20px rgba(200,150,60,0.1);
  }
  .option-icon {
    font-size: 1.5rem; width: 36px; text-align: center; flex-shrink: 0;
  }

  /* 按钮 */
  .btn-row { display: flex; gap: 12px; margin-top: 28px; justify-content: center; }
  .btn {
    padding: 12px 32px;
    border-radius: 30px;
    font-size: 0.95rem; font-weight: 600;
    cursor: pointer; border: none;
    transition: all 0.3s ease;
    font-family: inherit; letter-spacing: 1px;
  }
  .btn-prev {
    background: transparent;
    border: 1px solid rgba(180,140,80,0.3);
    color: #8a8070;
  }
  .btn-prev:hover { border-color: rgba(200,150,60,0.5); color: #c8b898; }
  .btn-next {
    background: linear-gradient(135deg, #8b6914, #c9973a);
    color: #1a1610;
    box-shadow: 0 4px 20px rgba(200,150,60,0.2);
  }
  .btn-next:hover {
    box-shadow: 0 6px 30px rgba(200,150,60,0.35);
    transform: translateY(-1px);
  }
  .btn-next:disabled {
    opacity: 0.35; cursor: not-allowed;
    box-shadow: none; transform: none;
  }
  .btn-submit {
    background: linear-gradient(135deg, #6b3a1f, #c9602a);
    color: #f5e6d0;
    font-size: 1.05rem; padding: 14px 44px;
    box-shadow: 0 4px 24px rgba(200,100,40,0.25);
  }
  .btn-submit:hover {
    box-shadow: 0 6px 36px rgba(220,120,50,0.4);
    transform: translateY(-2px);
  }
  .btn-restart {
    background: transparent;
    border: 1px solid rgba(200,150,60,0.4);
    color: #d4a853;
    padding: 10px 28px;
  }
  .btn-restart:hover { background: rgba(200,150,60,0.1); }

  /* 结果页 */
  .result-wrap { display: none; }
  .result-wrap.show { display: block; animation: fadeSlideIn 0.6s ease; }

  .result-header {
    text-align: center; padding: 30px 0 20px;
  }
  .result-icon {
    font-size: 80px; display: block;
    animation: resultBounce 0.8s ease;
  }
  @keyframes resultBounce {
    0% { transform: scale(0); opacity: 0; }
    50% { transform: scale(1.15); }
    100% { transform: scale(1); opacity: 1; }
  }
  .result-title {
    font-family: 'Noto Serif SC', serif;
    font-size: 2rem; font-weight: 900; margin-top: 12px;
  }
  .result-subtitle {
    font-size: 1rem; color: #8a8070;
    margin-top: 6px; letter-spacing: 2px;
  }

  /* 五行条 */
  .element-bars { margin: 24px 0; }
  .element-bar-row {
    display: flex; align-items: center; gap: 12px;
    margin-bottom: 10px;
  }
  .element-label {
    width: 60px; font-size: 0.85rem; color: #a89880;
    text-align: right; flex-shrink: 0;
  }
  .element-track {
    flex: 1; height: 10px;
    background: rgba(255,255,255,0.06);
    border-radius: 5px; overflow: hidden;
  }
  .element-fill {
    height: 100%; border-radius: 5px;
    transition: width 1s ease;
  }

  /* 特征区块 */
  .feature-grid {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 16px; margin: 24px 0;
  }
  .feature-item {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(180,140,80,0.12);
    border-radius: 14px; padding: 18px;
  }
  .feature-item h4 {
    font-size: 0.8rem; color: #c9973a;
    letter-spacing: 2px; margin-bottom: 8px;
  }
  .feature-item p {
    font-size: 0.9rem; color: #b0a090; line-height: 1.6;
  }

  /* 建议区块 */
  .advice-section {
    margin-top: 24px;
    padding: 20px;
    background: rgba(200,150,60,0.05);
    border: 1px solid rgba(200,150,60,0.15);
    border-radius: 16px;
  }
  .advice-section h3 {
    font-family: 'Noto Serif SC', serif;
    font-size: 1.1rem; color: #d4a853;
    margin-bottom: 14px; letter-spacing: 2px;
  }
  .advice-section ul {
    list-style: none; padding: 0;
  }
  .advice-section li {
    padding: 8px 0 8px 24px;
    position: relative; color: #b0a090;
    font-size: 0.9rem; line-height: 1.7;
  }
  .advice-section li::before {
    content: '◆';
    position: absolute; left: 0; top: 8px;
    color: #c9973a; font-size: 0.5rem;
  }

  /* 加载动画 */
  .loading-overlay {
    display: none; position: fixed; top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(5,5,8,0.9);
    z-index: 100;
    justify-content: center; align-items: center;
    flex-direction: column;
  }
  .loading-overlay.show { display: flex; }
  .loading-spinner {
    width: 60px; height: 60px;
    border: 3px solid rgba(200,150,60,0.2);
    border-top-color: #c9973a;
    border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text {
    margin-top: 20px; color: #8a8070;
    letter-spacing: 3px; font-size: 0.9rem;
  }

  /* 响应式 */
  @media (max-width: 480px) {
    .header h1 { font-size: 1.6rem; }
    .card { padding: 24px 18px; }
    .question-text { font-size: 1.1rem; }
    .feature-grid { grid-template-columns: 1fr; }
    .result-icon { font-size: 60px; }
    .result-title { font-size: 1.5rem; }
    .option-btn { padding: 14px 16px; font-size: 0.9rem; }
  }
</style>
</head>
<body>

<!-- 背景粒子 -->
<div class="bg-particles" id="bgParticles"></div>
<!-- 八卦装饰 -->
<div class="bagua-decoration">
  <div class="bagua-outer"></div>
  <div class="bagua-inner"></div>
</div>

<!-- 加载层 -->
<div class="loading-overlay" id="loadingOverlay">
  <div class="loading-spinner"></div>
  <div class="loading-text">推演命格中...</div>
</div>

<!-- 主容器 -->
<div class="container">
  <!-- 头部 -->
  <div class="header">
    <div class="symbol">☯</div>
    <h1>五行灵兽 · 命格测试</h1>
    <p class="subtitle">—— 洞悉你的五行本命，唤醒沉睡的灵兽之魂 ——</p>
  </div>

  <!-- 题目卡片 -->
  <div class="card" id="questionCard">
    <div class="progress-wrap">
      <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
      <div class="progress-num" id="progressNum">1/10</div>
    </div>
    <div id="questionsContainer"></div>
    <div class="btn-row" id="btnRow"></div>
  </div>

  <!-- 结果卡片 -->
  <div class="card result-wrap" id="resultCard">
    <div class="result-header">
      <span class="result-icon" id="resultIcon"></span>
      <div class="result-title" id="resultTitle"></div>
      <div class="result-subtitle" id="resultSubtitle"></div>
    </div>
    <div class="element-bars" id="elementBars"></div>
    <div class="feature-grid" id="featureGrid"></div>
    <div class="advice-section" id="adviceSection"></div>
    <div style="text-align:center;margin-top:28px;">
      <button class="btn btn-restart" onclick="restartTest()">⟳ 重新测试</button>
    </div>
  </div>
</div>

<script>
// ========== 题目数据 ==========
const questions = [

  {
    id: 3,
    text: '在人群中，你通常扮演什么样的角色？',
    options: [
      { text: '热情的点燃者，带动气氛的灵魂人物', value: 'fire', icon: '🎭' },
      { text: '温和的调和者，善于化解矛盾的和平使者', value: 'wood', icon: '🕊️' },

  {

      { text: '青绿 / 翠色——生机盎然，万物生长', value: 'wood', icon: '🟢' },
      { text: '墨黑 / 深蓝——深邃神秘，包容万象', value: 'water', icon: '🔵' },
      { text: '土黄 / 赭石——厚重朴实，承载万物', value: 'earth', icon: '🟤' },

  {

// ========== 五行-生肖映射 ==========
// 五行主属性 + 副属性 → 变体名称 + 动物
const elementMapping = {
  fire: {
    name: '火',
    subTypes: {
      fire_fire: { name: '烈阳之火', animal: '凤凰', icon: '🦅🔥', color: '#ff4d2e', emoji: '🔥' },

  },
  wood: {
    name: '木',
    subTypes: {

// ========== 状态 ==========
let currentQuestion = 0;
let answers = {};
let selectedOption = null;

// ========== 初始化背景粒子 ==========
function initParticles() {
  const container = document.getElementById('bgParticles');
  const colors = ['#c9973a', '#d4a853', '#8b6914', '#f0d78c', '#a08050'];
  for (let i = 0; i < 35; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.style.left = Math.random() * 100 + '%';
    p.style.width = p.style.height = (Math.random() * 4 + 1) + 'px';
    p.style.background = colors[Math.floor(Math.random() * colors.length)];
    p.style.animationDuration = (Math.random() * 12 + 8) + 's';
    p.style.animationDelay = (Math.random() * 10) + 's';
    container.appendChild(p);
  }
}

// ========== 渲染题目 ==========
function renderQuestion() {
  const q = questions[currentQuestion];
  const container = document.getElementById('questionsContainer');
  const btnRow = document.getElementById('btnRow');
  const progressFill = document.getElementById('progressFill');
  const progressNum = document.getElementById('progressNum');
  
  selectedOption = answers[q.id] || null;
  
  container.innerHTML = `
    <div class="question-wrap active">
      <div class="question-number">第 ${q.id} 问</div>
      <div class="question-text">${q.text}</div>
      <div class="options">
        ${q.options.map((opt, i) => `
          <button class="option-btn ${selectedOption === i ? 'selected' : ''}"
                  onclick="selectOption(${i})" data-idx="${i}">
            <span class="option-icon">${opt.icon}</span>
            <span>${opt.text}</span>
          </button>
        `).join('')}
      </div>
    </div>
  `;

  progressFill.style.width = ((currentQuestion + 1) / questions.length * 100) + '%';
  progressNum.textContent = `${currentQuestion + 1}/${questions.length}`;

  btnRow.innerHTML = `
    ${currentQuestion > 0 ? '<button class="btn btn-prev" onclick="prevQuestion()">← 上一题</button>' : ''}
    ${currentQuestion < questions.length - 1
      ? `<button class="btn btn-next" onclick="nextQuestion()" ${selectedOption === null ? 'disabled' : ''}>下一题 →</button>`
      : `<button class="btn btn-submit" onclick="submitTest()" ${selectedOption === null ? 'disabled' : ''}>✦ 揭晓命格 ✦</button>`
    }
  `;
}

function selectOption(idx) {
  selectedOption = idx;
  answers[questions[currentQuestion].id] = idx;
  
  document.querySelectorAll('.option-btn').forEach(btn => {
    btn.classList.toggle('selected', parseInt(btn.dataset.idx) === idx);
  });
  
  const nextBtn = document.querySelector('.btn-next, .btn-submit');
  if (nextBtn) nextBtn.disabled = false;
}

function nextQuestion() {
  if (selectedOption === null) return;
  if (currentQuestion < questions.length - 1) {
    currentQuestion++;
    renderQuestion();
    document.getElementById('questionCard').scrollIntoView({ behavior: 'smooth' });
  }
}

function prevQuestion() {
  if (currentQuestion > 0) {
    currentQuestion--;
    renderQuestion();
    document.getElementById('questionCard').scrollIntoView({ behavior: 'smooth' });
  }
}

// ========== 计算结果 ==========
function calculateResult() {
  const scores = { fire: 0, wood: 0, water: 0, earth: 0, metal: 0 };
  
  for (const [qId, optIdx] of Object.entries(answers)) {
    const q = questions.find(q => q.id === parseInt(qId));
    if (q && q.options[optIdx]) {
      scores[q.options[optIdx].value]++;
    }
  }

  // 排序取前两名
  const sorted = Object.entries(scores).sort((a, b) => b[1] - a[1]);
  const primary = sorted[0][0];
  const secondary = sorted[1][0];
  
  const subKey = `${primary}_${secondary}`;
  const mapping = elementMapping[primary];
  
  // 查找匹配的子类型，找不到就用 primary_primary
  let subType = mapping.subTypes[subKey];
  if (!subType) {
    // 尝试反向匹配
    const reverseKey = `${primary}_${primary}`;
    subType = mapping.subTypes[reverseKey] || mapping.subTypes[Object.keys(mapping.subTypes)[0]];
  }

  return {
    primary,
    secondary,
    scores,
    subType,
    elementName: mapping.name,
    maxScore: questions.length
  };
}

// ========== 渲染结果 ==========
function renderResult(result) {
  const { primary, secondary, scores, subType, elementName } = result;
  const desc = animalDescriptions[subType.animal] || { traits: '独特而神秘的存在', advice: '保持你的独特性，你的道路由你自己开创。' };

  // 隐藏题目卡片
  document.getElementById('questionCard').style.display = 'none';
  
  // 显示结果
  const resultCard = document.getElementById('resultCard');
  resultCard.classList.add('show');

  document.getElementById('resultIcon').textContent = subType.icon;
  document.getElementById('resultTitle').innerHTML = `<span style="color:${subType.color}">${subType.name}</span> · ${subType.animal}`;
  document.getElementById('resultSubtitle').textContent = `五行属${elementName} · 主${elementName}副${elementMapping[secondary].name}`;

  // 五行条
  const barColors = { fire: '#ff4d2e', wood: '#4caf50', water: '#2196f3', earth: '#8d6e63', metal: '#bdbdbd' };
  const barLabels = { fire: '火', wood: '木', water: '水', earth: '土', metal: '金' };
  document.getElementById('elementBars').innerHTML = Object.entries(scores)
    .sort((a, b) => b[1] - a[1])
    .map(([key, val]) => `
      <div class="element-bar-row">
        <div class="element-label">${barLabels[key]}</div>
        <div class="element-track">
          <div class="element-fill" style="width:0%;background:${barColors[key]};"
               data-width="${(val / result.maxScore * 100)}"></div>
        </div>
        <div style="font-size:0.8rem;color:#8a8070;width:30px;text-align:left;">${val}</div>
      </div>
    `).join('');

  // 特征网格
  document.getElementById('featureGrid').innerHTML = `
    <div class="feature-item">
      <h4>🔮 核心特质</h4>
      <p>${desc.traits}</p>
    </div>
    <div class="feature-item">
      <h4>🐾 灵兽属性</h4>
      <p>你的守护灵兽是 <strong style="color:${subType.color}">${subType.animal}</strong>，五行属<strong>${elementName}</strong>，${subType.name}之相</p>
    </div>
    <div class="feature-item">
      <h4>⚡ 能量特征</h4>
      <p>主${elementName}（${scores[primary]}分）副${elementMapping[secondary].name}（${scores[secondary]}分），${scores[primary] >= 5 ? '五行属性极为鲜明' : scores[primary] >= 3 ? '五行属性较为平衡' : '五行能量分布均匀'}</p>
    </div>
    <div class="feature-item">
      <h4>🌟 相生相克</h4>
      <p>${getElementRelation(primary)}</p>
    </div>
  `;

  // 建议
  document.getElementById('adviceSection').innerHTML = `
    <h3>📜 命格箴言</h3>
    <ul>
      <li>${desc.advice}</li>
      ${getExtraAdvice(primary)}
    </ul>
  `;

  resultCard.scrollIntoView({ behavior: 'smooth' });

  // 动画填充条
  setTimeout(() => {
    document.querySelectorAll('.element-fill').forEach(el => {
      el.style.width = el.dataset.width + '%';
    });
  }, 300);
}

function getElementRelation(primary) {
  const relations = {
    fire: '火生土，火克金。与水相遇则相克，与木相遇则相生。适合与属木、属土之人相处。',
    wood: '木生火，木克土。与金相遇则相克，与水相遇则相生。适合与属水、属火之人相处。',
    water: '水生木，水克火。与土相遇则相克，与金相遇则相生。适合与属金、属木之人相处。',
    earth: '土生金，土克水。与木相遇则相克，与火相遇则相生。适合与属火、属金之人相处。',
    metal: '金生水，金克木。与火相遇则相克，与土相遇则相生。适合与属土、属水之人相处。'
  };
  return relations[primary] || '';
}

function getExtraAdvice(primary) {
  const advices = {
    fire: '<li>火命之人需注意心脏和血液循环健康，避免过度劳累和情绪激动</li><li>宜佩戴木质饰品（木生火），居所宜朝南，多亲近阳光</li>',
    wood: '<li>木命之人需注意肝胆健康，保持情绪舒畅，避免长期压抑</li><li>宜多亲近自然和水源（水生木），居所宜有绿植环绕</li>',
    water: '<li>水命之人需注意肾脏和泌尿系统，保持充足睡眠，避免过度消耗</li><li>宜佩戴金属饰品（金生水），居所宜近水，保持环境湿润</li>',
    earth: '<li>土命之人需注意脾胃消化，饮食规律，避免思虑过度</li><li>宜多接触阳光和温暖（火生土），居所宜稳定，不宜频繁搬迁</li>',
    metal: '<li>金命之人需注意肺部和呼吸系统，保持空气清新，避免吸烟</li><li>宜亲近大地和自然（土生金），居所宜整洁有序，简约大方</li>'
  };
  return advices[primary] || '';
}

function submitTest() {
  if (selectedOption === null) return;
  answers[questions[currentQuestion].id] = selectedOption;
  
  // 检查是否全部答完
  if (Object.keys(answers).length < questions.length) {
    alert('请回答完所有题目后再揭晓命格');
    return;
  }

  // 显示加载动画
  document.getElementById('loadingOverlay').classList.add('show');
  
  setTimeout(() => {
    const result = calculateResult();
    document.getElementById('loadingOverlay').classList.remove('show');
    renderResult(result);
  }, 1800);
}

function restartTest() {
  currentQuestion = 0;
  answers = {};
  selectedOption = null;
  document.getElementById('questionCard').style.display = '';
  document.getElementById('resultCard').classList.remove('show');
  renderQuestion();
  document.getElementById('questionCard').scrollIntoView({ behavior: 'smooth' });
}

// ========== 启动 ==========
initParticles();
renderQuestion();
</script>
